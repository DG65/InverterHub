<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root {
    --bg: #16181d;
    --fg: #e9edf2;
    --muted: #9aa4b0;
    --panel: rgba(255,255,255,0.03);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  #wrap {
    background: var(--bg);
    color: var(--fg);
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    border-radius: 16px;
    padding: 16px 18px 18px;
    width: 100%;
  }
  #head { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; margin-bottom: 4px; }
  #title { font-size: 15px; font-weight: 700; letter-spacing: .2px; }
  #range { font-size: 13px; color: var(--muted); }
  #cols { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); font-weight: 600; margin: 6px 2px 2px; }
  svg { width: 100%; height: auto; display: block; }
  .nodeLabel { font-size: 12px; font-weight: 700; fill: #10141a; }
  .nodeVal   { font-size: 13px; font-weight: 800; }
  .nodePct   { font-size: 12px; font-weight: 700; }
  #empty { text-align: center; color: var(--muted); padding: 40px 0; font-size: 14px; }
</style>
</head>
<body>
<div id="wrap">
  <div id="head"><div id="title">Energiefluss</div><div id="range"></div></div>
  <div id="cols"><span>Energiequelle</span><span>Energieverbraucher</span></div>
  <div id="canvas"></div>
</div>
<script>
  var SVGNS = 'http://www.w3.org/2000/svg';

  function fmt(v, d) {
    return Number(v).toLocaleString('de-DE', { minimumFractionDigits: d, maximumFractionDigits: d });
  }
  function el(tag, attrs) {
    var e = document.createElementNS(SVGNS, tag);
    for (var k in attrs) { e.setAttribute(k, attrs[k]); }
    return e;
  }
  function hexA(hex, a) {
    var h = (hex || '#888').replace('#', '');
    var r = parseInt(h.substring(0,2),16), g = parseInt(h.substring(2,4),16), b = parseInt(h.substring(4,6),16);
    return 'rgba(' + r + ',' + g + ',' + b + ',' + a + ')';
  }

  function handleMessage(raw) {
    var d = (typeof raw === 'string') ? JSON.parse(raw) : raw;
    if (d.bg)   { document.documentElement.style.setProperty('--bg', d.bg); }
    if (d.font) { document.getElementById('wrap').style.fontFamily = d.font; }
    document.getElementById('range').textContent =
      (d.period ? d.period + ' · ' : '') + (d.range || '');

    var canvas = document.getElementById('canvas');
    canvas.innerHTML = '';

    if (!d.ok || !d.sources || !d.sources.length || !d.sinks || !d.sinks.length) {
      var e = document.createElement('div');
      e.id = 'empty';
      e.textContent = d.stateLabel || 'Keine Daten im Zeitraum';
      canvas.appendChild(e);
      return;
    }

    var W = 1000, NODE_W = 150, GAP = 10, PAD = 6;
    var sumSrc  = d.sources.reduce(function (a, n) { return a + n.val; }, 0);
    var sumSink = d.sinks.reduce(function (a, n) { return a + n.val; }, 0);
    var total   = Math.max(sumSrc, sumSink) || 1;

    // Höhe so wählen, dass auch kleine Knoten sichtbar bleiben.
    var nMax = Math.max(d.sources.length, d.sinks.length);
    var H = Math.max(360, nMax * 64);
    var availL = H - (d.sources.length - 1) * GAP - 2 * PAD;
    var availR = H - (d.sinks.length - 1) * GAP - 2 * PAD;
    var scale  = Math.min(availL / (sumSrc || 1), availR / (sumSink || 1));
    var MINH   = 3;

    var svg = el('svg', { viewBox: '0 0 ' + W + ' ' + H, preserveAspectRatio: 'xMidYMid meet' });

    // Knoten-Layout (Rechtecke + laufende Offsets für die Bänder).
    function layout(nodes, sumTotal, avail, x) {
      var draw = nodes.map(function (n) { return { n: n, h: Math.max(MINH, n.val * scale) }; });
      var used = draw.reduce(function (a, o) { return a + o.h; }, 0) + (draw.length - 1) * GAP;
      var y = PAD + Math.max(0, (H - 2 * PAD - used) / 2);
      draw.forEach(function (o) {
        o.x = x; o.y = y; o.top = y; o.outOff = y; o.inOff = y;
        y += o.h + GAP;
      });
      return draw;
    }
    var L = layout(d.sources, sumSrc, availL, 0);
    var R = layout(d.sinks, sumSink, availR, W - NODE_W);
    var byKeyL = {}; L.forEach(function (o) { byKeyL[o.n.key] = o; });
    var byKeyR = {}; R.forEach(function (o) { byKeyR[o.n.key] = o; });

    // Bänder (Bezier) zuerst, damit die Knoten darüber liegen.
    // Nach Quellenreihenfolge, je Quelle nach Senkenreihenfolge.
    var sinkOrder = {}; R.forEach(function (o, i) { sinkOrder[o.n.key] = i; });
    L.forEach(function (src) {
      var mine = d.flows.filter(function (f) { return f.from === src.n.key; });
      mine.sort(function (a, b) { return (sinkOrder[a.to] || 0) - (sinkOrder[b.to] || 0); });
      mine.forEach(function (f) {
        var dst = byKeyR[f.to];
        if (!dst) { return; }
        var th = Math.max(1, f.val * scale);
        var y0 = src.outOff, y1 = dst.inOff;
        src.outOff += th; dst.inOff += th;
        var x0 = src.x + NODE_W, x1 = dst.x, xm = (x0 + x1) / 2;
        var p = 'M' + x0 + ',' + y0
              + 'C' + xm + ',' + y0 + ' ' + xm + ',' + y1 + ' ' + x1 + ',' + y1
              + 'L' + x1 + ',' + (y1 + th)
              + 'C' + xm + ',' + (y1 + th) + ' ' + xm + ',' + (y0 + th) + ' ' + x0 + ',' + (y0 + th)
              + 'Z';
        var band = el('path', { d: p, fill: hexA(src.n.color, 0.42) });
        svg.appendChild(band);
      });
    });

    // Knoten + Beschriftung.
    function drawNodes(arr, side) {
      arr.forEach(function (o) {
        var n = o.n;
        svg.appendChild(el('rect', {
          x: o.x, y: o.y, width: NODE_W, height: o.h, rx: 8, ry: 8,
          fill: n.color, opacity: 0.92
        }));
        if (o.h < 16) { return; }
        var pad = 10;
        var lx = (side === 'L') ? o.x + pad : o.x + NODE_W - pad;
        var anchor = (side === 'L') ? 'start' : 'end';
        // Bezeichnung oben
        var t1 = el('text', { x: lx, y: o.y + 17, class: 'nodeLabel', 'text-anchor': anchor });
        t1.textContent = n.label;
        svg.appendChild(t1);
        // Wert (kWh) nur bei ausreichend hohem Knoten (sonst Kollision mit %).
        if (o.h > 58) {
          var t2 = el('text', { x: lx, y: o.y + 35, class: 'nodeVal', 'text-anchor': anchor, fill: '#10141a' });
          t2.textContent = fmt(n.val, 2) + ' ' + (d.unit || 'kWh');
          svg.appendChild(t2);
        }
        // Prozent unten (ab mittlerer Höhe); bei sehr flachen Knoten entfällt es.
        if (o.h > 30) {
          var t3 = el('text', { x: lx, y: o.y + o.h - 8, class: 'nodePct', 'text-anchor': anchor, fill: '#10141a' });
          t3.textContent = fmt(n.pct, 2) + ' %';
          svg.appendChild(t3);
        }
      });
    }
    drawNodes(L, 'L');
    drawNodes(R, 'R');

    canvas.appendChild(svg);
  }

  if (typeof window !== 'undefined') { window.handleMessage = handleMessage; }
</script>
</body>
</html>
