<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  html, body { margin: 0; height: 100%; background: transparent; }
  .wrap { box-sizing: border-box; padding: 12px 12px 12px; font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
  #head { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; margin: 0 2px 6px; }
  #title { font-size: 15px; font-weight: 700; }
  #cols { display: flex; justify-content: space-between; font-size: 12px; font-weight: 600; margin: 0 2px 4px; }
  #range { font-size: 13px; }
  #chart { width: 100%; height: 380px; }
  .empty { font-size: 13px; padding: 28px 10px; text-align: center; }
</style>
</head>
<body>
  <div class="wrap">
    <div id="head"><div id="title">Energiefluss</div><div id="range"></div></div>
    <div id="cols"><span>Energiequelle</span><span>Energieverbraucher</span></div>
    <div id="chart"></div>
  </div>

  <script>
    var lastData = null, chart = null, chartEngine = null, libs = { hc: 0, ec: 0 };

    function handleMessage(payload) {
      var data = (typeof payload === 'string') ? JSON.parse(payload) : payload;
      if (!data) { return; }
      lastData = data;
      document.body.style.background = data.bg ? data.bg : 'transparent';
      document.documentElement.style.background = data.bg ? data.bg : 'transparent';
      render();
    }

    function fmt(v, d) { return Number(v).toLocaleString('de-DE', { minimumFractionDigits: d, maximumFractionDigits: d }); }
    function isDarkColor(hex) {
      var m = /^#?([0-9a-f]{6})$/i.exec(hex || ''); if (!m) { return null; }
      var n = parseInt(m[1], 16);
      return (0.299 * ((n >> 16) & 255) + 0.587 * ((n >> 8) & 255) + 0.114 * (n & 255)) < 140;
    }
    function addScript(src, cb) {
      var s = document.createElement('script'); s.src = src; s.onload = cb; s.onerror = function () { cb && cb(); };
      document.head.appendChild(s);
    }
    function ensureLib(engine, cb) {
      if (engine === 'echarts') {
        if (typeof echarts !== 'undefined') { libs.ec = 2; return cb(); }
        if (libs.ec === 1) { return setTimeout(function () { ensureLib(engine, cb); }, 80); }
        libs.ec = 1; addScript('https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js', function () { libs.ec = 2; cb(); });
      } else {
        if (typeof Highcharts !== 'undefined' && Highcharts.seriesTypes && Highcharts.seriesTypes.sankey) { libs.hc = 2; return cb(); }
        if (libs.hc === 1) { return setTimeout(function () { ensureLib(engine, cb); }, 80); }
        libs.hc = 1; addScript('https://code.highcharts.com/highcharts.js', function () {
          addScript('https://code.highcharts.com/modules/sankey.js', function () { libs.hc = 2; cb(); });
        });
      }
    }
    function destroyChart() {
      if (chart) { try { if (chartEngine === 'highcharts') { chart.destroy(); } else { chart.dispose(); } } catch (e) {} }
      chart = null; chartEngine = null;
      var c = document.getElementById('chart'); if (c) { c.innerHTML = ''; }
    }

    // Theme + aufbereitete Knoten/Links.
    function prep() {
      var d = lastData;
      var bgDark = isDarkColor(d.bg);
      var dark = (bgDark !== null) ? bgDark : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
      var nameById = {}, colById = {}, colColById = {};
      (d.nodes || []).forEach(function (n) { nameById[n.id] = n.name; colById[n.id] = n.color; colColById[n.id] = n.col; });
      // Ein-/Ausgänge je Knoten (für Tooltip-Summen).
      var inn = {}, out = {};
      (d.links || []).forEach(function (l) { out[l.from] = (out[l.from] || 0) + l.val; inn[l.to] = (inn[l.to] || 0) + l.val; });
      return {
        d: d, dark: dark,
        TEXT: dark ? '#e8edf2' : '#1b2430', MUTED: dark ? '#9fb0c0' : '#5c6b7a',
        TIP: dark ? 'rgba(28,38,52,.97)' : 'rgba(255,255,255,.98)', BORDER: dark ? 'rgba(159,176,192,.34)' : 'rgba(92,107,122,.30)',
        font: d.font || 'system-ui, sans-serif', unit: d.unit || 'kWh', totalIn: d.totalIn || 0,
        nameById: nameById, colById: colById, colColById: colColById, inn: inn, out: out
      };
    }
    function pct(v, tot) { return tot > 0 ? ' · ' + fmt(v / tot * 100, 1) + ' %' : ''; }

    function render() {
      var data = lastData; if (!data) { return; }
      var engine = (data.engine === 'highcharts') ? 'highcharts' : 'echarts';
      var el = document.getElementById('chart');
      document.getElementById('range').textContent = (data.period ? data.period + ' · ' : '') + (data.range || '');
      var dark0 = isDarkColor(data.bg);
      var d0 = (dark0 !== null) ? dark0 : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches);
      document.getElementById('title').style.color = d0 ? '#e8edf2' : '#1b2430';
      document.getElementById('range').style.color = d0 ? '#9fb0c0' : '#5c6b7a';
      document.getElementById('cols').style.color = d0 ? '#9fb0c0' : '#5c6b7a';
      el.style.height = ((data.height && data.height >= 220) ? data.height : 380) + 'px';

      if (!data.ok || !data.hasData || !data.links || !data.links.length) {
        destroyChart();
        el.style.color = d0 ? '#9fb0c0' : '#5c6b7a';
        el.innerHTML = '<div class="empty">' + (data.stateLabel || 'Keine Energie im Zeitraum') + '</div>';
        return;
      }
      ensureLib(engine, function () {
        if (typeof echarts === 'undefined' && typeof Highcharts === 'undefined') {
          el.innerHTML = '<div class="empty">Diagramm-Bibliothek konnte nicht geladen werden (Internet erforderlich).</div>';
          return;
        }
        if (chart && chartEngine !== engine) { destroyChart(); }
        chartEngine = engine;
        if (engine === 'echarts' && typeof echarts !== 'undefined') { buildEC(); }
        else if (typeof Highcharts !== 'undefined') { buildHC(); }
      });
    }

    // ---- Highcharts (sankey) ----------------------------------------------
    function buildHC() {
      var P = prep(), d = P.d, el = document.getElementById('chart');
      var nodes = (d.nodes || []).map(function (n) { return { id: n.id, name: n.name, color: n.color, column: n.col }; });
      var data = (d.links || []).map(function (l) { return { from: l.from, to: l.to, weight: l.val }; });

      var options = {
        chart: { backgroundColor: 'transparent', style: { fontFamily: P.font }, animation: false, marginTop: 6, marginBottom: 6 },
        title: { text: undefined }, credits: { enabled: false }, exporting: { enabled: false },
        tooltip: {
          useHTML: true, backgroundColor: P.TIP, borderColor: P.BORDER, borderRadius: 6,
          style: { color: P.TEXT, fontSize: '12px' },
          nodeFormatter: function () {
            var v = Math.max(P.inn[this.id] || 0, P.out[this.id] || 0);
            var extra = '';
            if ((P.inn[this.id] || 0) > 0 && (P.out[this.id] || 0) > 0) {
              extra = '<div style="color:' + P.MUTED + '">geladen ' + fmt(P.inn[this.id], 2) + ' · entladen ' + fmt(P.out[this.id], 2) + ' ' + P.unit + '</div>';
            }
            return '<span style="color:' + this.color + '">●</span> <b>' + this.name + '</b><br>'
              + fmt(v, 2) + ' ' + P.unit + pct(v, P.totalIn) + extra;
          },
          pointFormatter: function () {
            return '<span style="color:' + P.colById[this.from] + '">●</span> '
              + P.nameById[this.from] + ' → <b>' + P.nameById[this.to] + '</b><br>'
              + fmt(this.weight, 2) + ' ' + P.unit + pct(this.weight, P.totalIn);
          }
        },
        plotOptions: { sankey: { animation: false, nodePadding: 14, curveFactor: 0.5, linkOpacity: 0.45,
          dataLabels: { enabled: true, style: { color: P.TEXT, fontSize: '12px', fontWeight: '600', textOutline: 'none' } } } },
        series: [{ type: 'sankey', name: 'Energie', keys: ['from', 'to', 'weight'], nodes: nodes, data: data }]
      };
      el.innerHTML = ''; chart = Highcharts.chart('chart', options);
    }

    // ---- Apache ECharts (sankey) ------------------------------------------
    function buildEC() {
      var P = prep(), d = P.d, el = document.getElementById('chart');
      var nodes = (d.nodes || []).map(function (n) {
        var pos = (n.col === 2) ? 'left' : (n.col === 1 ? 'top' : 'right');
        return { name: n.id, depth: n.col, itemStyle: { color: n.color, borderColor: n.color }, label: { color: P.TEXT, position: pos } };
      });
      var links = (d.links || []).map(function (l) { return { source: l.from, target: l.to, value: l.val }; });

      var option = {
        backgroundColor: 'transparent',
        textStyle: { fontFamily: P.font, color: P.TEXT },
        animation: false,
        tooltip: {
          trigger: 'item', triggerOn: 'mousemove',
          backgroundColor: P.TIP, borderColor: P.BORDER, borderWidth: 1, textStyle: { color: P.TEXT, fontSize: 12 },
          formatter: function (p) {
            if (p.dataType === 'edge') {
              return '<span style="color:' + P.colById[p.data.source] + '">●</span> '
                + P.nameById[p.data.source] + ' → <b>' + P.nameById[p.data.target] + '</b><br>'
                + fmt(p.data.value, 2) + ' ' + P.unit + pct(p.data.value, P.totalIn);
            }
            var id = p.name, v = Math.max(P.inn[id] || 0, P.out[id] || 0), extra = '';
            if ((P.inn[id] || 0) > 0 && (P.out[id] || 0) > 0) {
              extra = '<br><span style="color:' + P.MUTED + '">geladen ' + fmt(P.inn[id], 2) + ' · entladen ' + fmt(P.out[id], 2) + ' ' + P.unit + '</span>';
            }
            return '<span style="color:' + P.colById[id] + '">●</span> <b>' + P.nameById[id] + '</b><br>'
              + fmt(v, 2) + ' ' + P.unit + pct(v, P.totalIn) + extra;
          }
        },
        series: [{
          type: 'sankey', left: 8, right: 12, top: 8, bottom: 8,
          nodeWidth: 16, nodeGap: 14, draggable: false,
          emphasis: { focus: 'adjacency' },
          data: nodes, links: links,
          label: { formatter: function (p) { return P.nameById[p.name]; }, color: P.TEXT, fontWeight: 600, fontSize: 12 },
          lineStyle: { color: 'gradient', opacity: 0.42, curveness: 0.5 }
        }]
      };
      if (!chart) { el.innerHTML = ''; chart = echarts.init(el, null, { renderer: 'canvas' }); }
      chart.setOption(option, true);
    }

    window.addEventListener('resize', function () {
      if (!chart) { return; }
      if (chartEngine === 'echarts') { chart.resize(); } else { chart.reflow(); }
    });

    if (typeof window !== 'undefined') { window.handleMessage = handleMessage; }
  </script>
</body>
</html>
