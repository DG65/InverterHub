<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root {
    --accent: #4caf50;
    --orange: #ff9800;
    --idle: rgba(215,215,215,0.7);
    --idle-glow: rgba(148,148,148,0);
    --wire: rgba(148,148,148,0.5);
    --box: rgba(255,255,255,0.06);
    --text: inherit;
    --textmuted: rgba(148,148,148,0.85);
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    --scale: 1;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    font-size: calc(13px * var(--scale));
    background: transparent;
    color: var(--text);
    padding: 44px 14px 16px;
    user-select: none;
    min-height: 100%;
  }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 6px;
    font-size: calc(11px * var(--scale));
    color: var(--textmuted);
  }
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--textmuted);
    flex-shrink: 0;
  }
  .status-dot.ok { background: var(--accent); }
  .status-dot.pulse { animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50%      { opacity: 0.35; }
  }
  .state-label { font-weight: 600; color: var(--text); }

  .flow-wrap {
    position: relative;
    width: 100%;
    max-width: 340px;
    margin: 0 auto;
  }
  .flow-svg { width: 100%; height: auto; display: block; overflow: visible; }

  text { font-family: var(--font); }

  .node-value {
    font-size: calc(21px * var(--scale));
    font-weight: 800;
    fill: var(--text);
  }
  .node-value-unit {
    font-size: calc(11px * var(--scale));
    font-weight: 600;
    fill: var(--textmuted);
  }
  .node-label {
    font-size: calc(11px * var(--scale));
    fill: var(--textmuted);
  }
  .node-soc {
    font-size: calc(22px * var(--scale));
    font-weight: 800;
  }
  .node-sub {
    font-size: calc(13px * var(--scale));
    font-weight: 700;
    fill: var(--text);
  }

  /* Verbindungen: dezente "Marschierende Ameisen" für Fluss-Richtung */
  .wire {
    fill: none;
    stroke: var(--wire);
    stroke-width: 3;
    stroke-linecap: round;
  }
  .wire-flow {
    fill: none;
    stroke-width: 3;
    stroke-linecap: round;
    stroke-dasharray: 1 11;
    opacity: 0;
    transition: opacity 0.35s;
  }
  .wire-flow.active {
    opacity: 1;
    animation: dash 900ms linear infinite;
  }
  .wire-flow.reverse.active { animation-direction: reverse; }
  @keyframes dash { to { stroke-dashoffset: -24; } }

  .arrow {
    opacity: 0;
    transition: opacity 0.35s;
  }
  .arrow.active { opacity: 1; }

  /* Node-Ringe: neutrales Grau im Ruhezustand, farbig + Leuchten wenn aktiv */
  .node-glow {
    fill: none;
    stroke-width: 12;
    stroke: var(--idle-glow);
    filter: blur(6px);
    transition: stroke 0.35s;
  }
  .node-ring {
    fill: #14171c;
    stroke-width: 3;
    stroke: var(--idle);
    transition: stroke 0.35s;
  }
  .node.on-green .node-ring   { stroke: var(--accent); }
  .node.on-green .node-glow   { stroke: color-mix(in srgb, var(--accent) 55%, transparent); }
  .node.on-orange .node-ring  { stroke: var(--orange); }
  .node.on-orange .node-glow  { stroke: color-mix(in srgb, var(--orange) 55%, transparent); }

  .node-icon {
    stroke: var(--idle);
    fill: var(--idle);
    transition: stroke 0.35s, fill 0.35s, opacity 0.35s;
  }
  .node.on-green .node-icon  { stroke: var(--accent); fill: var(--accent); }
  .node.on-orange .node-icon { stroke: var(--orange); fill: var(--orange); }
  .node.dim .node-icon { opacity: 0.3; }

  .node.on-green .node-value,
  .node.on-green .node-soc { fill: var(--accent); }
  .node.on-orange .node-soc { fill: var(--orange); }

  .node.dim .node-soc { fill: var(--idle); }
</style>
</head>
<body>

<div class="status-bar">
  <span class="status-dot" id="dot"></span>
  <span class="state-label" id="stateLabel">–</span>
</div>

<div class="flow-wrap">
<svg class="flow-svg" viewBox="0 0 340 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="var(--wire)"/>
    </marker>
  </defs>

  <!-- ── Verbindungen (Bus: Solar–Batterie senkrecht, Abzweige zu Netz/Last) ── -->
  <!-- Solar -> Netz -->
  <path class="wire" d="M170,148 C170,190 108,190 108,222" />
  <path id="wf-grid-fwd" class="wire-flow" d="M170,148 C170,190 108,190 108,222" style="stroke:var(--wire)" marker-end="url(#arrowhead)"/>
  <path id="wf-grid-rev" class="wire-flow reverse" d="M108,222 C108,190 170,190 170,148" style="stroke:var(--wire)" marker-end="url(#arrowhead)"/>

  <!-- Solar -> Last -->
  <path class="wire" d="M170,148 C170,190 232,190 232,222" />
  <path id="wf-house-fwd" class="wire-flow" d="M170,148 C170,190 232,190 232,222" style="stroke:var(--wire)" marker-end="url(#arrowhead)"/>

  <!-- Solar -> Batterie -->
  <path class="wire" d="M170,158 L170,322" />
  <path id="wf-bat-fwd" class="wire-flow" d="M170,158 L170,322" style="stroke:var(--wire)" marker-end="url(#arrowhead)"/>
  <path id="wf-bat-rev" class="wire-flow reverse" d="M170,322 L170,158" style="stroke:var(--wire)" marker-end="url(#arrowhead)"/>

  <!-- ── Solar (oben) ── -->
  <g class="node" id="node-pv" transform="translate(170,90)">
    <circle class="node-glow" r="54"/>
    <circle class="node-ring" r="54"/>
    <g class="node-icon" transform="translate(0,-20)" stroke-width="2" fill="none">
      <circle r="7" fill="currentColor" stroke="none"/>
      <g stroke="currentColor">
        <line x1="0" y1="-13" x2="0" y2="-10"/>
        <line x1="0" y1="10" x2="0" y2="13"/>
        <line x1="-13" y1="0" x2="-10" y2="0"/>
        <line x1="10" y1="0" x2="13" y2="0"/>
        <line x1="-9.2" y1="-9.2" x2="-7" y2="-7"/>
        <line x1="7" y1="7" x2="9.2" y2="9.2"/>
        <line x1="-9.2" y1="9.2" x2="-7" y2="7"/>
        <line x1="7" y1="-7" x2="9.2" y2="-9.2"/>
      </g>
    </g>
    <text id="lbl-pv-val" x="0" y="12" text-anchor="middle" class="node-value">0<tspan class="node-value-unit" dx="2">kW</tspan></text>
    <text x="0" y="32" text-anchor="middle" class="node-label">Solar</text>
  </g>

  <!-- ── Netz (links) ── -->
  <g class="node dim" id="node-grid" transform="translate(60,270)">
    <circle class="node-glow" r="54"/>
    <circle class="node-ring" r="54"/>
    <g class="node-icon" transform="translate(0,-20)" stroke-width="2" fill="none">
      <rect x="-11" y="-9" width="22" height="15" rx="3" stroke="currentColor" fill="none"/>
      <line x1="-5" y1="-13" x2="-5" y2="-9" stroke="currentColor"/>
      <line x1="5"  y1="-13" x2="5"  y2="-9" stroke="currentColor"/>
      <line x1="-11" y1="0" x2="-15" y2="0" stroke="currentColor"/>
      <line x1="11" y1="0" x2="15" y2="0" stroke="currentColor"/>
    </g>
    <text id="lbl-grid-val" x="0" y="12" text-anchor="middle" class="node-value">0<tspan class="node-value-unit" dx="2">kW</tspan></text>
    <text x="0" y="32" text-anchor="middle" class="node-label">Netz</text>
  </g>

  <!-- ── Last (rechts) ── -->
  <g class="node dim" id="node-house" transform="translate(280,270)">
    <circle class="node-glow" r="54"/>
    <circle class="node-ring" r="54"/>
    <g class="node-icon" transform="translate(0,-20)" stroke-width="2" fill="none">
      <polygon points="0,-13 15,-1 15,13 -15,13 -15,-1" stroke="currentColor" fill="none"/>
    </g>
    <text id="lbl-house-val" x="0" y="12" text-anchor="middle" class="node-value">0<tspan class="node-value-unit" dx="2">kW</tspan></text>
    <text x="0" y="32" text-anchor="middle" class="node-label">Last</text>
  </g>

  <!-- ── Batterie (unten) ── -->
  <g class="node dim" id="node-bat" transform="translate(170,392)">
    <circle class="node-glow" r="58"/>
    <circle class="node-ring" r="58"/>
    <g class="node-icon" transform="translate(0,-27)" stroke-width="2" fill="none">
      <rect x="-11" y="-8" width="19" height="16" rx="2.5" stroke="currentColor" fill="none"/>
      <rect x="8" y="-4" width="3.5" height="8" rx="1" fill="currentColor" stroke="none"/>
      <rect id="bat-fill" x="-9" y="-6" width="15" height="12" rx="1.5" fill="currentColor" opacity="0.35" stroke="none"/>
      <g id="bat-badge" transform="translate(-14,-14)">
        <circle r="6" fill="currentColor" stroke="none"/>
        <line x1="-3" y1="0" x2="3" y2="0" stroke="#14171c" stroke-width="1.6"/>
        <line x1="0" y1="-3" x2="0" y2="3" stroke="#14171c" stroke-width="1.6"/>
      </g>
    </g>
    <text id="lbl-bat-soc" x="0" y="6" text-anchor="middle" class="node-soc">–%</text>
    <text x="0" y="24" text-anchor="middle" class="node-label">Batterie</text>
    <text id="lbl-bat-val" x="0" y="41" text-anchor="middle" class="node-sub">0<tspan class="node-value-unit" dx="2">kW</tspan></text>
  </g>

</svg>
</div>

<script>
function fmtKw(w) {
  const kw = (w || 0) / 1000;
  return kw.toLocaleString('de-DE', { minimumFractionDigits: 3, maximumFractionDigits: 3 });
}

function setValueText(id, watts) {
  const el = document.getElementById(id);
  const unitSpan = el.querySelector('.node-value-unit') || el.querySelector('tspan');
  el.firstChild.nodeValue = fmtKw(watts);
}

function setFlow(idFwd, idRev, active, reverse, color) {
  const fwd = document.getElementById(idFwd);
  if (fwd) {
    fwd.classList.toggle('active', active && !reverse);
    fwd.style.stroke = color;
  }
  if (idRev) {
    const rev = document.getElementById(idRev);
    if (rev) {
      rev.classList.toggle('active', active && reverse);
      rev.style.stroke = color;
    }
  }
}

function setNodeState(nodeId, have, active, colorClass) {
  const el = document.getElementById(nodeId);
  el.classList.remove('on-green', 'on-orange');
  el.classList.toggle('dim', !have || !active);
  if (have && active) {
    el.classList.add(colorClass);
  }
}

function handleMessage(raw) {
  const d = typeof raw === 'string' ? JSON.parse(raw) : raw;

  const root = document.documentElement;
  if (d.accent)    root.style.setProperty('--accent', d.accent);
  if (d.bg)        document.body.style.background = d.bg;
  if (d.box)       root.style.setProperty('--box', d.box);
  if (d.text)      root.style.setProperty('--text', d.text);
  if (d.textmuted) root.style.setProperty('--textmuted', d.textmuted);
  if (d.font)      root.style.setProperty('--font', d.font);
  if (d.scale)     root.style.setProperty('--scale', d.scale);

  const dot = document.getElementById('dot');
  dot.className = 'status-dot' + (d.ok ? ' ok pulse' : '');
  document.getElementById('stateLabel').textContent = d.stateLabel ?? '–';

  if (!d.ok) return;

  const pvW    = d.pvW    ?? 0;
  const gridW  = d.gridW  ?? 0;
  const houseW = d.houseW ?? 0;
  const batW   = d.batW   ?? 0;

  const pvActive    = d.pvHave    && Math.abs(pvW)    > 20;
  const gridActive  = d.gridHave  && Math.abs(gridW)  > 20;
  const houseActive = d.houseHave && Math.abs(houseW) > 20;
  const batActive   = d.batHave   && Math.abs(batW)   > 20;

  // Solar
  setValueText('lbl-pv-val', Math.abs(pvW));
  setNodeState('node-pv', d.pvHave, pvActive, 'on-green');

  // Netz: Export (>0) = grün, Bezug (<0) = orange
  setValueText('lbl-grid-val', Math.abs(gridW));
  setNodeState('node-grid', d.gridHave, gridActive, gridW >= 0 ? 'on-green' : 'on-orange');
  setFlow('wf-grid-fwd', 'wf-grid-rev', gridActive, gridW < 0, gridW >= 0 ? 'var(--accent)' : 'var(--orange)');

  // Last
  setValueText('lbl-house-val', Math.abs(houseW));
  setNodeState('node-house', d.houseHave, houseActive, 'on-orange');
  setFlow('wf-house-fwd', null, houseActive, false, 'var(--orange)');

  // Batterie: Laden (>0) = orange, Entladen (<0) = grün (speist ins Haus)
  setValueText('lbl-bat-val', Math.abs(batW));
  setNodeState('node-bat', d.batHave, batActive, batW >= 0 ? 'on-orange' : 'on-green');
  setFlow('wf-bat-fwd', 'wf-bat-rev', batActive, batW < 0, batW >= 0 ? 'var(--orange)' : 'var(--accent)');

  document.getElementById('bat-badge').style.display = (d.batHave && batW >= 0) ? '' : 'none';

  const socEl = document.getElementById('lbl-bat-soc');
  if (d.socHave) {
    socEl.textContent = Math.round(d.soc) + '%';
    const pct = Math.max(0, Math.min(100, d.soc)) / 100;
    const fill = document.getElementById('bat-fill');
    fill.setAttribute('height', (12 * pct).toFixed(1));
    fill.setAttribute('y', (6 - 12 * pct).toFixed(1));
  } else {
    socEl.textContent = '–%';
  }
}
</script>
</body>
</html>
