<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root {
    --grey: rgba(158,158,158,0.85);
    --grey-glow: rgba(158,158,158,0);
    --wire: rgba(148,148,148,0.45);
    --text: inherit;
    --textmuted: rgba(158,158,158,0.9);
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  /* Alles (inkl. Statuszeile) liegt in EINEM SVG mit viewBox, damit die
     gesamte Kachel beim Skalieren des Widgets als Einheit mitwächst statt
     nur der Grafikteil (HTML-Text außerhalb des SVG würde nicht mitskalieren). */
  html, body {
    width: 100%; height: 100%;
    background: transparent;
    user-select: none;
    overflow: hidden;
  }
  body { display: flex; }

  .flow-svg { width: 100%; height: 100%; display: block; }

  text { font-family: var(--font); }

  .status-dot { fill: var(--textmuted); }
  .status-dot.ok { fill: #4caf50; }
  .status-dot.pulse { animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50%      { opacity: 0.35; }
  }
  .state-label { font-size: 15px; font-weight: 600; fill: var(--textmuted); }

  /* Fill/Stroke sind vererbbare CSS-Eigenschaften bei SVG (im Gegensatz zu
     "color"/currentColor, das hier NICHT verwendet wird) - Kind-Elemente der
     Icon-Gruppe erben --nc daher automatisch ohne "currentColor"-Fallstrick. */
  .node-icon, .node-icon * {
    fill: var(--nc, var(--grey));
    stroke: var(--nc, var(--grey));
    transition: fill 0.4s, stroke 0.4s;
  }
  .node-icon rect[fill="none"], .node-icon polygon[fill="none"] { fill: none; }

  .node-value {
    font-size: 30px;
    font-weight: 800;
    fill: var(--nc, var(--grey));
    transition: fill 0.4s;
  }
  .node-value-unit {
    font-size: 15px;
    font-weight: 600;
    fill: var(--textmuted);
  }
  .node-label {
    font-size: 15px;
    fill: var(--textmuted);
  }
  .node-soc {
    font-size: 30px;
    font-weight: 800;
    fill: var(--nc, var(--grey));
    transition: fill 0.4s;
  }
  .node-sub {
    font-size: 17px;
    font-weight: 700;
    fill: var(--nc, var(--grey));
    transition: fill 0.4s;
  }

  .wire {
    fill: none;
    stroke: var(--wire);
    stroke-width: 3;
    stroke-linecap: round;
  }
  .wire-flow {
    fill: none;
    stroke-width: 3.5;
    stroke-linecap: round;
    stroke-dasharray: 1 11;
    opacity: 0;
    transition: opacity 0.35s, stroke 0.4s;
  }
  .wire-flow.active {
    opacity: 1;
    animation: dash 900ms linear infinite;
  }
  .wire-flow.reverse.active { animation-direction: reverse; }
  @keyframes dash { to { stroke-dashoffset: -24; } }

  .node-glow {
    fill: none;
    stroke-width: 14;
    stroke: var(--grey-glow);
    filter: blur(8px);
    transition: stroke 0.4s;
  }
  .node-ring {
    fill: #14171c;
    stroke-width: 3;
    stroke: var(--nc, var(--grey));
    transition: stroke 0.4s;
  }
</style>
</head>
<body>

<svg class="flow-svg" viewBox="0 0 410 555" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <defs>
    <marker id="arrow-pv"  markerWidth="9" markerHeight="9" refX="4.5" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z"/></marker>
    <marker id="arrow-nz"  markerWidth="9" markerHeight="9" refX="4.5" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z"/></marker>
    <marker id="arrow-ls"  markerWidth="9" markerHeight="9" refX="4.5" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z"/></marker>
    <marker id="arrow-bt"  markerWidth="9" markerHeight="9" refX="4.5" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 Z"/></marker>
  </defs>

  <!-- ── Statuszeile ── -->
  <circle id="dot" class="status-dot" cx="20" cy="22" r="6.5"/>
  <text id="stateLabel" x="34" y="27" class="state-label">–</text>

  <!-- ── Wandlungsverluste (nur sichtbar, wenn ein Hauslastzähler in der
       InverterHub-Instanz konfiguriert ist) - klein am Kreuzungspunkt,
       VOR den Speichen gezeichnet, damit die Pfeile darüber liegen ── -->
  <g class="node" id="node-loss" transform="translate(280,360)" style="display:none">
    <circle class="node-glow" r="28" style="stroke-width:9"/>
    <circle class="node-ring" r="28"/>
    <g class="node-icon" transform="translate(0,-13)" stroke-width="1.8" fill="none">
      <path d="M0,-7 C3.4,-2.6 3.4,0.8 0,3.4 C0.8,0.8 -0.8,0 -0.8,1.7 C-1.7,-0.8 -2.6,-3.4 0,-7 Z" stroke-linejoin="round"/>
    </g>
    <text id="lbl-loss-val" x="0" y="4" text-anchor="middle" style="font-size:12px;font-weight:800" class="node-value">0<tspan class="node-value-unit" dx="1" style="font-size:8px">kW</tspan></text>
    <text x="0" y="17" text-anchor="middle" style="font-size:8px" class="node-label">Verluste</text>
  </g>

  <!-- ── Diamant-Layout: Mitte (205,285), 4 Speichen zu den Knoten ── -->
  <!-- Solar (oben) -->
  <line class="wire" x1="205" y1="285" x2="205" y2="135"/>
  <path id="wf-pv-out" class="wire-flow" d="M205,285 L205,135" marker-end="url(#arrow-pv)"/>
  <path id="wf-pv-in"  class="wire-flow reverse" d="M205,135 L205,285" marker-end="url(#arrow-pv)"/>

  <!-- Netz (links) -->
  <line class="wire" x1="205" y1="285" x2="55" y2="285"/>
  <path id="wf-nz-out" class="wire-flow" d="M205,285 L55,285" marker-end="url(#arrow-nz)"/>
  <path id="wf-nz-in"  class="wire-flow reverse" d="M55,285 L205,285" marker-end="url(#arrow-nz)"/>

  <!-- Last (rechts) -->
  <line class="wire" x1="205" y1="285" x2="355" y2="285"/>
  <path id="wf-ls-out" class="wire-flow" d="M205,285 L355,285" marker-end="url(#arrow-ls)"/>

  <!-- Batterie (unten) -->
  <line class="wire" x1="205" y1="285" x2="205" y2="435"/>
  <path id="wf-bt-out" class="wire-flow" d="M205,285 L205,435" marker-end="url(#arrow-bt)"/>
  <path id="wf-bt-in"  class="wire-flow reverse" d="M205,435 L205,285" marker-end="url(#arrow-bt)"/>

  <!-- ── Solar: PV erzeugt und speist immer Richtung Zentrum (nie umgekehrt) ── -->
  <g class="node" id="node-pv" transform="translate(205,135)">
    <circle class="node-glow" r="52"/>
    <circle class="node-ring" r="52"/>
    <g class="node-icon" transform="translate(0,-17)" stroke-width="2.2" fill="none">
      <circle r="8" stroke="none"/>
      <g>
        <line x1="0" y1="-14" x2="0" y2="-11"/>
        <line x1="0" y1="11" x2="0" y2="14"/>
        <line x1="-14" y1="0" x2="-11" y2="0"/>
        <line x1="11" y1="0" x2="14" y2="0"/>
        <line x1="-9.9" y1="-9.9" x2="-7.6" y2="-7.6"/>
        <line x1="7.6" y1="7.6" x2="9.9" y2="9.9"/>
        <line x1="-9.9" y1="9.9" x2="-7.6" y2="7.6"/>
        <line x1="7.6" y1="-7.6" x2="9.9" y2="-9.9"/>
      </g>
    </g>
    <text id="lbl-pv-val" x="0" y="14" text-anchor="middle" class="node-value">0<tspan class="node-value-unit" dx="2">kW</tspan></text>
    <text x="0" y="33" text-anchor="middle" class="node-label">Solar</text>
  </g>

  <!-- ── Netz ── -->
  <g class="node" id="node-grid" transform="translate(55,285)">
    <circle class="node-glow" r="52"/>
    <circle class="node-ring" r="52"/>
    <g class="node-icon" transform="translate(0,-17)" stroke-width="2.2" fill="none" stroke-linejoin="round" stroke-linecap="round">
      <polygon points="2,-13 -7,2 -1,2 -3,13 8,-2 2,-2" fill="none"/>
    </g>
    <text id="lbl-grid-val" x="0" y="14" text-anchor="middle" class="node-value">0<tspan class="node-value-unit" dx="2">kW</tspan></text>
    <text x="0" y="33" text-anchor="middle" class="node-label">Netz</text>
  </g>

  <!-- ── Last ── -->
  <g class="node" id="node-house" transform="translate(355,285)">
    <circle class="node-glow" r="52"/>
    <circle class="node-ring" r="52"/>
    <g class="node-icon" transform="translate(0,-17)" stroke-width="2.2" fill="none">
      <polygon points="0,-14 16,-1 16,14 -16,14 -16,-1"/>
    </g>
    <text id="lbl-house-val" x="0" y="14" text-anchor="middle" class="node-value">0<tspan class="node-value-unit" dx="2">kW</tspan></text>
    <text x="0" y="33" text-anchor="middle" class="node-label">Last</text>
  </g>

  <!-- ── Batterie ── -->
  <g class="node" id="node-bat" transform="translate(205,435)">
    <circle class="node-glow" r="56"/>
    <circle class="node-ring" r="56"/>
    <g class="node-icon" transform="translate(0,-25)" stroke-width="2.2" fill="none">
      <rect x="-12" y="-9" width="21" height="18" rx="2.5" fill="none"/>
      <rect x="9" y="-4.5" width="4" height="9" rx="1" stroke="none"/>
      <rect id="bat-fill" x="-10" y="-7" width="17" height="14" rx="1.5" opacity="0.4" stroke="none"/>
      <g id="bat-badge" transform="translate(-15,-15)">
        <circle r="6.5" stroke="none"/>
        <line x1="-3.2" y1="0" x2="3.2" y2="0" stroke="#14171c" stroke-width="1.7"/>
        <line id="bat-badge-vert" x1="0" y1="-3.2" x2="0" y2="3.2" stroke="#14171c" stroke-width="1.7"/>
      </g>
    </g>
    <text id="lbl-bat-soc" x="0" y="6" text-anchor="middle" class="node-soc">–%</text>
    <text x="0" y="24" text-anchor="middle" class="node-label">Batterie</text>
    <text id="lbl-bat-val" x="0" y="42" text-anchor="middle" class="node-sub">0<tspan class="node-value-unit" dx="2">kW</tspan></text>
  </g>

</svg>

<script>
const C_SOLAR = [255, 179, 0];   // Sonnengelb
const C_BAT   = [33, 150, 243];  // Blau
const C_GREEN = [67, 160, 71];   // Einspeisung / lokal versorgt
const C_RED   = [229, 57, 53];   // Bezug / netzversorgt
const C_GREY  = [158, 158, 158];
const C_LOSS  = [255, 112, 67];  // Wandlungsverluste (Wechselrichter-Eigenverbrauch etc.)

function rgb(c) { return 'rgb(' + c[0] + ',' + c[1] + ',' + c[2] + ')'; }
function lerp(a, b, t) {
  t = Math.max(0, Math.min(1, t));
  return [
    Math.round(a[0] + (b[0] - a[0]) * t),
    Math.round(a[1] + (b[1] - a[1]) * t),
    Math.round(a[2] + (b[2] - a[2]) * t),
  ];
}

function fmtKw(w) {
  const kw = (w || 0) / 1000;
  return kw.toLocaleString('de-DE', { minimumFractionDigits: 3, maximumFractionDigits: 3 });
}

function setValueText(id, watts) {
  document.getElementById(id).firstChild.nodeValue = fmtKw(watts);
}

// Corona-Helligkeit wächst mit der Leistung (Wurzel-Skala, damit auch
// kleinere Leistungen sichtbar bleiben und es nicht schlagartig "an/aus" wirkt).
function glowAlpha(magnitudeW, refW) {
  const t = Math.max(0, Math.min(1, magnitudeW / refW));
  return 0.14 + Math.sqrt(t) * 0.5;
}

// Setzt Knotenfarbe (--nc), Corona proportional zur Leistung, Grau-Fallback
// ohne Daten. refW = grober Referenzwert für "volle" Corona-Helligkeit.
function setNode(nodeId, have, magnitudeW, refW, color) {
  const el = document.getElementById(nodeId);
  const active = have && magnitudeW > 20;
  const c = have ? color : C_GREY;
  el.style.setProperty('--nc', rgb(c));
  el.querySelector('.node-glow').style.stroke = active
    ? 'rgba(' + c[0] + ',' + c[1] + ',' + c[2] + ',' + glowAlpha(magnitudeW, refW).toFixed(2) + ')'
    : 'var(--grey-glow)';
  return active;
}

function setFlow(idOut, idIn, active, reverse, color, markerId) {
  const col = rgb(color);
  const out = document.getElementById(idOut);
  out.classList.toggle('active', active && !reverse);
  out.style.stroke = col;
  if (idIn) {
    const inn = document.getElementById(idIn);
    inn.classList.toggle('active', active && reverse);
    inn.style.stroke = col;
  }
  // <marker>-Inhalte erben Farben nicht automatisch von der referenzierenden
  // Linie (kein CSS-Vererbungskontext) - Pfeilspitze daher explizit einfärben.
  if (markerId) {
    const m = document.querySelector('#' + markerId + ' path');
    if (m) m.style.fill = col;
  }
}

function handleMessage(raw) {
  const d = typeof raw === 'string' ? JSON.parse(raw) : raw;

  const root = document.documentElement;
  if (d.font) root.style.setProperty('--font', d.font);
  if (d.bg)   document.body.style.background = d.bg;

  const dot = document.getElementById('dot');
  dot.setAttribute('class', 'status-dot' + (d.ok ? ' ok pulse' : ''));
  document.getElementById('stateLabel').textContent = d.stateLabel ?? '–';

  if (!d.ok) return;

  const pvW    = d.pvW    ?? 0;
  const gridW  = d.gridW  ?? 0;  // >0 Einspeisung, <0 Bezug
  const houseW = d.houseW ?? 0;  // stets >=0 (Last)
  const batW   = d.batW   ?? 0;  // >0 Entladen, <0 Laden

  // Solar: erzeugt immer Richtung Zentrum/Hausnetz - Pfeil zeigt ausgehend
  // von der Sonne nach unten zur Mitte, niemals umgekehrt.
  setValueText('lbl-pv-val', Math.abs(pvW));
  const pvActive = setNode('node-pv', d.pvHave, Math.abs(pvW), 6000, C_SOLAR);
  setFlow('wf-pv-out', 'wf-pv-in', pvActive, true, C_SOLAR, 'arrow-pv');

  // Netz: Einspeisung = Grün (Fluss Zentrum->Netz), Bezug = Rot (Netz->Zentrum)
  setValueText('lbl-grid-val', Math.abs(gridW));
  const gridColor  = gridW >= 0 ? C_GREEN : C_RED;
  const gridActive = setNode('node-grid', d.gridHave, Math.abs(gridW), 5000, gridColor);
  setFlow('wf-nz-out', 'wf-nz-in', gridActive, gridW < 0, gridColor, 'arrow-nz');

  // Last: moderater Farbverlauf je nach Quellenanteil (Netzbezug -> Rot,
  // PV/Batterie-gedeckt -> Grün). Fluss immer vom Zentrum zum Haus.
  setValueText('lbl-house-val', houseW);
  const gridImportW = (d.gridHave && gridW < 0) ? Math.abs(gridW) : 0;
  const gridShare   = houseW > 0 ? Math.min(1, gridImportW / houseW) : 0;
  const houseColor  = lerp(C_GREEN, C_RED, gridShare);
  const houseActive = setNode('node-house', d.houseHave, houseW, 6000, houseColor);
  setFlow('wf-ls-out', null, houseActive, false, houseColor, 'arrow-ls');

  // Batterie: immer Blau. >0 = Entladen (Fluss Batterie->Zentrum),
  // <0 = Laden (Fluss Zentrum->Batterie).
  setValueText('lbl-bat-val', Math.abs(batW));
  const batActive = setNode('node-bat', d.batHave, Math.abs(batW), 5000, C_BAT);
  setFlow('wf-bt-out', 'wf-bt-in', batActive, batW > 0, C_BAT, 'arrow-bt');

  // Lade-Badge ("+"): nur sichtbar bei aktivem Fluss, wird beim Entladen
  // durch Ausblenden des senkrechten Strichs zum Minuszeichen.
  document.getElementById('bat-badge').style.display = batActive ? '' : 'none';
  document.getElementById('bat-badge-vert').style.display = (batW > 0) ? 'none' : '';

  const socEl = document.getElementById('lbl-bat-soc');
  if (d.socHave) {
    socEl.textContent = Math.round(d.soc) + '%';
    const pct = Math.max(0, Math.min(100, d.soc)) / 100;
    const fill = document.getElementById('bat-fill');
    fill.setAttribute('height', (14 * pct).toFixed(1));
    fill.setAttribute('y', (7 - 14 * pct).toFixed(1));
  } else {
    socEl.textContent = '–%';
  }

  // Wandlungsverluste: nur sichtbar, wenn InverterHub einen Hauslastzähler
  // konfiguriert hat (lossHave) UND ein nennenswerter Verlust vorliegt -
  // sonst bleibt der kleine Kreis am Kreuzungspunkt ausgeblendet.
  const lossNode = document.getElementById('node-loss');
  const lossW = d.lossW ?? 0;
  if (d.lossHave && lossW > 15) {
    lossNode.style.display = '';
    setValueText('lbl-loss-val', lossW);
    lossNode.style.setProperty('--nc', rgb(C_LOSS));
    lossNode.querySelector('.node-glow').style.stroke =
      'rgba(' + C_LOSS[0] + ',' + C_LOSS[1] + ',' + C_LOSS[2] + ',' + glowAlpha(lossW, 800).toFixed(2) + ')';
  } else {
    lossNode.style.display = 'none';
  }
}
</script>
</body>
</html>
