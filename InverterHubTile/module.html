<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root {
    --grey: rgba(158,158,158,0.85);
    --grey-glow: rgba(158,158,158,0);
    --wire: rgba(150,150,150,0.42);
    --ring-decor: rgba(190,190,190,0.55);
    --text: inherit;
    --textmuted: rgba(158,158,158,0.9);
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  /* Alles liegt in EINEM SVG mit viewBox, damit die gesamte Kachel beim
     Skalieren des Widgets als Einheit mitwächst. Absolute Positionierung
     statt Flexbox, da ein Flex-Kind mit width/height:100% in manchen
     Kachel-Hosts nicht zuverlässig auf die tatsächliche Containergröße
     schrumpft und dadurch Inhalt am Rand abgeschnitten wurde. */
  html, body { width: 100%; height: 100%; background: transparent; user-select: none; overflow: hidden; }
  body { position: relative; }

  .flow-svg { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }

  text { font-family: var(--font); }

  .status-dot { fill: var(--textmuted); }
  .status-dot.ok { fill: #4caf50; }
  .status-dot.pulse { animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
  .state-label { font-size: 15px; font-weight: 600; fill: var(--textmuted); }

  /* Fill/Stroke sind vererbbare CSS-Eigenschaften bei SVG (im Gegensatz zu
     "color"/currentColor) - Icon-Kinder erben --nc automatisch. */
  .node-icon, .node-icon * { fill: var(--nc, var(--grey)); stroke: var(--nc, var(--grey)); }
  .node-icon rect[data-hollow], .node-icon polygon[data-hollow] { fill: none; }

  /* Striktes, überall identisches Template: Icon -> Wert -> Label, in genau
     dieser Reihenfolge und mit denselben Abständen für JEDEN Knoten. */
  .node-value { font-size: 22px; font-weight: 800; fill: var(--nc, var(--grey)); }
  .node-value-unit { font-size: 11px; font-weight: 600; fill: var(--textmuted); }
  .node-label { font-size: 12.5px; fill: var(--textmuted); }
  .node-sub { font-size: 10px; font-weight: 700; }

  .wire { fill: none; stroke: var(--wire); stroke-width: 2.5; stroke-linecap: round; }
  .wire-flow {
    fill: none; stroke-width: 3; stroke-linecap: round;
    stroke-dasharray: 1 10; opacity: 0; transition: opacity 0.35s;
  }
  .wire-flow.active { opacity: 1; animation: dash 900ms linear infinite; }
  .wire-flow.reverse { animation-direction: reverse; }
  @keyframes dash { to { stroke-dashoffset: -22; } }

  /* Kollektor-Ring: bewusst kräftiger als die dünnen Speichen, damit er als
     eigenständiges Gestaltungselement erkennbar bleibt. */
  .ring-decor { fill: none; stroke: var(--ring-decor); stroke-width: 3.5; stroke-dasharray: 2 6; }

  .node-glow { fill: none; stroke-width: 13; filter: blur(8px); }
  .node-ring { fill: #14171c; stroke-width: 3; stroke: var(--nc, var(--grey)); }
</style>
</head>
<body>

<svg class="flow-svg" id="svg" viewBox="0 0 560 580" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <defs id="markerDefs"></defs>

  <!-- Statuszeile -->
  <circle id="dot" class="status-dot" cx="20" cy="22" r="6.5"/>
  <text id="stateLabel" x="34" y="27" class="state-label">–</text>

  <!-- Dynamischer Inhalt: Speichen zuerst (unten), dann Knoten (oben) -->
  <g id="wires-layer"></g>

  <!-- Zentrum: Hauslast, immer vorhanden. Kollektor-Ring liegt etwa mittig
       zwischen Zentrums- und äußeren Kreisen (siehe R_RING/R_CENTER/R_OUTER). -->
  <circle class="ring-decor" id="ring-decor" cx="280" cy="301" r="96"/>
  <g id="node-center" transform="translate(280,301)">
    <circle class="node-glow" r="60"/>
    <circle class="node-ring" r="60"/>
    <g class="node-icon" transform="translate(0,-16)" stroke-width="2" fill="none">
      <polygon points="0,-15 17,-1 17,15 -17,15 -17,-1" data-hollow="1"/>
    </g>
    <text id="lbl-center-val" x="0" y="12" text-anchor="middle" class="node-value">0<tspan class="node-value-unit" dx="2">kW</tspan></text>
    <text x="0" y="29" text-anchor="middle" class="node-label">Hauslast</text>
  </g>

  <g id="nodes-layer"></g>
</svg>

<script>
const CX = 280, CY = 301;          // Zentrum
const R_CENTER = 60, R_RING = 96;  // Zentrums-/Kollektorring-Radius
const R_OUTER  = 178;              // Abstand der äußeren Knoten vom Zentrum
const R_NODE   = 50;               // Radius der äußeren Knoten

const C_SOLAR = [255, 179, 0];
const C_BAT   = [33, 150, 243];
const C_GREEN = [67, 160, 71];
const C_RED   = [229, 57, 53];
const C_GREY  = [158, 158, 158];

function rgb(c) { return 'rgb(' + c[0] + ',' + c[1] + ',' + c[2] + ')'; }
function lerp(a, b, t) {
  t = Math.max(0, Math.min(1, t));
  return [
    Math.round(a[0] + (b[0]-a[0])*t), Math.round(a[1] + (b[1]-a[1])*t), Math.round(a[2] + (b[2]-a[2])*t)
  ];
}
function fmtKw(w) {
  const kw = (w || 0) / 1000;
  return kw.toLocaleString('de-DE', { minimumFractionDigits: 3, maximumFractionDigits: 3 });
}
function glowAlpha(magnitudeW, refW) {
  const t = Math.max(0, Math.min(1, magnitudeW / refW));
  return 0.14 + Math.sqrt(t) * 0.5;
}
const SVGNS = 'http://www.w3.org/2000/svg';
function el(tag, attrs) {
  const e = document.createElementNS(SVGNS, tag);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  return e;
}

// <marker>-Inhalte erben KEINE Farbe von der referenzierenden Linie (kein
// CSS-Vererbungskontext für SVG-Marker) - pro Knoten wird daher ein eigenes,
// bereits passend eingefärbtes Marker-Element angelegt statt eines einzigen
// globalen Pfeils (der zuvor von allen Knoten geteilt wurde und dadurch nur
// in einer Farbe bzw. Schwarz erschien).
function makeMarker(id, color) {
  const m = el('marker', { id, markerWidth: 9, markerHeight: 9, refX: 4.5, refY: 4.5, orient: 'auto' });
  const p = el('path', { d: 'M0,0 L9,4.5 L0,9 Z' });
  p.style.fill = rgb(color);
  m.appendChild(p);
  return m;
}

// -- Icon-Zeichner: jeweils eine Gruppe von Kindelementen, im 32x32-Raster
//    zentriert auf (0,0), wird an fester Position translate(0,-16) verankert.
const ICONS = {
  sun(g) {
    g.appendChild(el('circle', { r: 7, stroke: 'none' }));
    const rays = [[0,-13,0,-10],[0,10,0,13],[-13,0,-10,0],[10,0,13,0],
      [-9.2,-9.2,-7,-7],[7,7,9.2,9.2],[-9.2,9.2,-7,7],[7,-7,9.2,-9.2]];
    rays.forEach(([x1,y1,x2,y2]) => g.appendChild(el('line', { x1,y1,x2,y2 })));
  },
  bolt(g) {
    g.appendChild(el('polygon', {
      points: '2,-12 -6.5,2 -1,2 -2.7,12 7.3,-2 2,-2', 'data-hollow': '1',
      'stroke-linejoin': 'round', 'stroke-linecap': 'round'
    }));
  },
  house(g) {
    g.appendChild(el('polygon', { points: '0,-15 17,-1 17,15 -17,15 -17,-1', 'data-hollow': '1' }));
  },
  battery(g, socPct) {
    g.appendChild(el('rect', { x: -11, y: -8, width: 19, height: 16, rx: 2.3, 'data-hollow': '1' }));
    g.appendChild(el('rect', { x: 8, y: -4, width: 3.5, height: 8, rx: 1, stroke: 'none' }));
    if (socPct != null) {
      const fillH = 12 * Math.max(0, Math.min(100, socPct)) / 100;
      g.appendChild(el('rect', { x: -9, y: 6 - fillH, width: 15, height: fillH, rx: 1.3, opacity: 0.4, stroke: 'none' }));
    }
  },
  flame(g) {
    g.appendChild(el('path', {
      d: 'M0,-8 C3.7,-2.8 3.7,0.9 0,3.7 C1.1,0.9 -0.9,0 -0.9,1.9 C-1.9,-0.9 -2.8,-3.7 0,-8 Z',
      'stroke-linejoin': 'round'
    }));
  },
};

// -- Node-Definitionen: legen fest, welche äußeren Knoten grundsätzlich
//    existieren können. "have"/"w" verweisen auf Felder im Payload. Neue
//    Verbraucher (Wallbox, Wärmepumpe, ...) werden künftig hier ergänzt -
//    Anzahl und Winkelaufteilung passen sich automatisch an.
const NODE_DEFS = [
  { key: 'pv',   label: 'Solar',    icon: 'sun',     have: 'pvHave',   w: 'pvW',
    color: () => C_SOLAR, dir: () => 'in' },
  { key: 'grid', label: 'Netz',     icon: 'bolt',    have: 'gridHave', w: 'gridW',
    color: (w) => w >= 0 ? C_GREEN : C_RED, dir: (w) => w >= 0 ? 'out' : 'in' },
  { key: 'bat',  label: 'Batterie', icon: 'battery', have: 'batHave',  w: 'batW',
    color: () => C_BAT, dir: (w) => w > 0 ? 'in' : 'out', battery: true },
  { key: 'loss', label: 'Verluste', icon: 'flame',   have: 'lossHave', w: 'lossW',
    color: () => C_GREY, dir: () => 'out', grey: true, minMagnitude: 15 },
];

function setValueText(textEl, watts) {
  textEl.firstChild.nodeValue = fmtKw(watts);
}

function buildOuterNode(def, angleDeg, d, markerDefs) {
  const rad = angleDeg * Math.PI / 180;
  const cx = CX + R_OUTER * Math.cos(rad);
  const cy = CY + R_OUTER * Math.sin(rad);
  const w = d[def.w] ?? 0;
  const magnitude = Math.abs(w);
  const have = !!d[def.have];
  const active = have && magnitude > (def.minMagnitude ?? 20);
  const color = def.grey ? C_GREY : (have ? def.color(w) : C_GREY);

  const g = el('g', { transform: `translate(${cx},${cy})` });
  g.style.setProperty('--nc', rgb(color));

  const glow = el('circle', { class: 'node-glow', r: R_NODE });
  glow.style.stroke = active ? `rgba(${color[0]},${color[1]},${color[2]},${glowAlpha(magnitude, def.battery || def.grey ? 5000 : 6000).toFixed(2)})` : 'var(--grey-glow)';
  g.appendChild(glow);
  g.appendChild(el('circle', { class: 'node-ring', r: R_NODE }));

  const iconG = el('g', { class: 'node-icon', transform: 'translate(0,-15)', 'stroke-width': 2, fill: 'none' });
  ICONS[def.icon](iconG, def.battery ? d.soc : null);
  g.appendChild(iconG);

  const valText = el('text', { x: 0, y: 11, 'text-anchor': 'middle', class: 'node-value' });
  valText.appendChild(document.createTextNode('0'));
  const unit = el('tspan', { class: 'node-value-unit', dx: 2 });
  unit.textContent = 'kW';
  valText.appendChild(unit);
  setValueText(valText, magnitude);
  g.appendChild(valText);

  const labelText = el('text', { x: 0, y: 27, 'text-anchor': 'middle', class: 'node-label' });
  labelText.textContent = def.label;
  g.appendChild(labelText);

  if (def.battery && d.socHave) {
    const socText = el('text', { x: 0, y: -28, 'text-anchor': 'middle', class: 'node-sub' });
    socText.style.fill = rgb(color);
    socText.textContent = Math.round(d.soc) + '%';
    g.appendChild(socText);
  }

  // Speiche: von der Kante des äußeren Knotens bis zur Kante des
  // Kollektor-Rings, exakt entlang der Verbindungslinie berechnet - "streng
  // geometrisch", keine Freihand-Kurven.
  const dx = CX - cx, dy = CY - cy;
  const dist = Math.hypot(dx, dy);
  const ux = dx / dist, uy = dy / dist;
  const startX = cx + ux * R_NODE, startY = cy + uy * R_NODE;
  const endX   = CX - ux * R_RING, endY   = CY - uy * R_RING;

  const markerId = 'arrow-' + def.key;
  markerDefs.appendChild(makeMarker(markerId, color));

  const wireStatic = el('line', { class: 'wire', x1: startX, y1: startY, x2: endX, y2: endY });

  const dir = def.dir(w);
  const flowActive = active;
  // "in"  = Fluss vom Knoten ins Zentrum -> Pfeil endet am Ring (Kreuz-Layout-Mitte)
  // "out" = Fluss vom Zentrum zum Knoten -> Pfeil endet am Knoten
  const outPath = el('path', {
    class: 'wire-flow' + (flowActive && dir === 'in' ? ' active' : ''),
    d: `M${startX},${startY} L${endX},${endY}`,
    'marker-end': `url(#${markerId})`,
  });
  const inPath = el('path', {
    class: 'wire-flow reverse' + (flowActive && dir === 'out' ? ' active' : ''),
    d: `M${endX},${endY} L${startX},${startY}`,
    'marker-end': `url(#${markerId})`,
  });
  [outPath, inPath].forEach(p => { p.style.stroke = rgb(color); });

  return { g, wires: [wireStatic, outPath, inPath] };
}

function handleMessage(raw) {
  const d = typeof raw === 'string' ? JSON.parse(raw) : raw;

  if (d.font) document.documentElement.style.setProperty('--font', d.font);
  if (d.bg)   document.body.style.background = d.bg;

  const dot = document.getElementById('dot');
  dot.setAttribute('class', 'status-dot' + (d.ok ? ' ok pulse' : ''));
  document.getElementById('stateLabel').textContent = d.stateLabel ?? '–';

  const wiresLayer = document.getElementById('wires-layer');
  const nodesLayer = document.getElementById('nodes-layer');
  const markerDefs = document.getElementById('markerDefs');
  wiresLayer.innerHTML = '';
  nodesLayer.innerHTML = '';
  markerDefs.innerHTML = '';

  if (!d.ok) return;

  const houseW = d.houseW ?? 0;
  const gridImportW = (d.gridHave && (d.gridW ?? 0) < 0) ? Math.abs(d.gridW) : 0;
  const gridShare = houseW > 0 ? Math.min(1, gridImportW / houseW) : 0;
  const centerColor = lerp(C_GREEN, C_RED, gridShare);
  const centerActive = !!d.houseHave && houseW > 20;

  const centerG = document.getElementById('node-center');
  centerG.style.setProperty('--nc', rgb(d.houseHave ? centerColor : C_GREY));
  centerG.querySelector('.node-glow').style.stroke = centerActive
    ? `rgba(${centerColor[0]},${centerColor[1]},${centerColor[2]},${glowAlpha(houseW, 8000).toFixed(2)})`
    : 'var(--grey-glow)';
  setValueText(document.getElementById('lbl-center-val'), houseW);

  const activeDefs = NODE_DEFS.filter(def => d[def.have]);
  const n = activeDefs.length;
  activeDefs.forEach((def, i) => {
    const angleDeg = -90 + (360 / n) * i;
    const { g, wires } = buildOuterNode(def, angleDeg, d, markerDefs);
    wires.forEach(w => wiresLayer.appendChild(w));
    nodesLayer.appendChild(g);
  });
}
</script>
</body>
</html>
