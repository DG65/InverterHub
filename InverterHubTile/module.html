<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root {
    --grey: rgba(158,158,158,0.85);
    --grey-glow: rgba(158,158,158,0);
    --wire: rgba(148,148,148,0.45);
    --box: rgba(255,255,255,0.06);
    --text: inherit;
    --textmuted: rgba(158,158,158,0.9);
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    --scale: 1;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    font-size: calc(13px * var(--scale));
    background: transparent;
    color: var(--text);
    padding: 40px 10px 14px;
    user-select: none;
    min-height: 100%;
  }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
    font-size: calc(11px * var(--scale));
    color: var(--textmuted);
  }
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--textmuted);
    flex-shrink: 0;
  }
  .status-dot.ok { background: #4caf50; }
  .status-dot.pulse { animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50%      { opacity: 0.35; }
  }
  .state-label { font-weight: 600; color: var(--textmuted); }

  .flow-wrap {
    position: relative;
    width: 100%;
    max-width: 360px;
    margin: 0 auto;
  }
  .flow-svg { width: 100%; height: auto; display: block; overflow: visible; }

  text { font-family: var(--font); }

  /* Fill/Stroke sind vererbbare CSS-Eigenschaften bei SVG (im Gegensatz zu
     "color"/currentColor, das hier NICHT verwendet wird) - Kind-Elemente der
     Icon-Gruppe erben --nc daher automatisch ohne "currentColor"-Fallstrick. */
  .node-icon, .node-icon * {
    fill: var(--nc, var(--grey));
    stroke: var(--nc, var(--grey));
    transition: fill 0.4s, stroke 0.4s;
  }
  .node-icon rect[fill="none"], .node-icon polygon[fill="none"] { fill: none; }

  .node-value {
    font-size: calc(21px * var(--scale));
    font-weight: 800;
    fill: var(--nc, var(--grey));
    transition: fill 0.4s;
  }
  .node-value-unit {
    font-size: calc(11px * var(--scale));
    font-weight: 600;
    fill: var(--textmuted);
  }
  .node-label {
    font-size: calc(11px * var(--scale));
    fill: var(--textmuted);
  }
  .node-soc {
    font-size: calc(22px * var(--scale));
    font-weight: 800;
    fill: var(--nc, var(--grey));
    transition: fill 0.4s;
  }
  .node-sub {
    font-size: calc(13px * var(--scale));
    font-weight: 700;
    fill: var(--nc, var(--grey));
    transition: fill 0.4s;
  }

  .wire {
    fill: none;
    stroke: var(--wire);
    stroke-width: 3;
    stroke-linecap: round;
  }
  .wire-flow {
    fill: none;
    stroke-width: 3;
    stroke-linecap: round;
    stroke-dasharray: 1 11;
    opacity: 0;
    transition: opacity 0.35s, stroke 0.4s;
  }
  .wire-flow.active {
    opacity: 1;
    animation: dash 900ms linear infinite;
  }
  .wire-flow.reverse.active { animation-direction: reverse; }
  @keyframes dash { to { stroke-dashoffset: -24; } }

  .node-glow {
    fill: none;
    stroke-width: 12;
    stroke: var(--grey-glow);
    filter: blur(7px);
    transition: stroke 0.4s;
  }
  .node-ring {
    fill: #14171c;
    stroke-width: 3;
    stroke: var(--nc, var(--grey));
    transition: stroke 0.4s;
  }
</style>
</head>
<body>

<div class="status-bar">
  <span class="status-dot" id="dot"></span>
  <span class="state-label" id="stateLabel">–</span>
</div>

<div class="flow-wrap">
<svg class="flow-svg" viewBox="0 0 410 540" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow-pv"  markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z"/></marker>
    <marker id="arrow-nz"  markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z"/></marker>
    <marker id="arrow-ls"  markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z"/></marker>
    <marker id="arrow-bt"  markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z"/></marker>
  </defs>

  <!-- ── Diamant-Layout: Mitte (205,270), 4 Speichen zu den Knoten ── -->
  <!-- Solar (oben) -->
  <line class="wire" x1="205" y1="270" x2="205" y2="120"/>
  <path id="wf-pv-out" class="wire-flow" d="M205,270 L205,120" marker-end="url(#arrow-pv)"/>
  <path id="wf-pv-in"  class="wire-flow reverse" d="M205,120 L205,270" marker-end="url(#arrow-pv)"/>

  <!-- Netz (links) -->
  <line class="wire" x1="205" y1="270" x2="55" y2="270"/>
  <path id="wf-nz-out" class="wire-flow" d="M205,270 L55,270" marker-end="url(#arrow-nz)"/>
  <path id="wf-nz-in"  class="wire-flow reverse" d="M55,270 L205,270" marker-end="url(#arrow-nz)"/>

  <!-- Last (rechts) -->
  <line class="wire" x1="205" y1="270" x2="355" y2="270"/>
  <path id="wf-ls-out" class="wire-flow" d="M205,270 L355,270" marker-end="url(#arrow-ls)"/>

  <!-- Batterie (unten) -->
  <line class="wire" x1="205" y1="270" x2="205" y2="420"/>
  <path id="wf-bt-out" class="wire-flow" d="M205,270 L205,420" marker-end="url(#arrow-bt)"/>
  <path id="wf-bt-in"  class="wire-flow reverse" d="M205,420 L205,270" marker-end="url(#arrow-bt)"/>

  <!-- ── Solar ── -->
  <g class="node" id="node-pv" transform="translate(205,120)">
    <circle class="node-glow" r="50"/>
    <circle class="node-ring" r="50"/>
    <g class="node-icon" transform="translate(0,-16)" stroke-width="2" fill="none">
      <circle r="7" stroke="none"/>
      <g>
        <line x1="0" y1="-13" x2="0" y2="-10"/>
        <line x1="0" y1="10" x2="0" y2="13"/>
        <line x1="-13" y1="0" x2="-10" y2="0"/>
        <line x1="10" y1="0" x2="13" y2="0"/>
        <line x1="-9.2" y1="-9.2" x2="-7" y2="-7"/>
        <line x1="7" y1="7" x2="9.2" y2="9.2"/>
        <line x1="-9.2" y1="9.2" x2="-7" y2="7"/>
        <line x1="7" y1="-7" x2="9.2" y2="-9.2"/>
      </g>
    </g>
    <text id="lbl-pv-val" x="0" y="12" text-anchor="middle" class="node-value">0<tspan class="node-value-unit" dx="2">kW</tspan></text>
    <text x="0" y="30" text-anchor="middle" class="node-label">Solar</text>
  </g>

  <!-- ── Netz ── -->
  <g class="node" id="node-grid" transform="translate(55,270)">
    <circle class="node-glow" r="50"/>
    <circle class="node-ring" r="50"/>
    <g class="node-icon" transform="translate(0,-16)" stroke-width="2" fill="none">
      <rect x="-11" y="-9" width="22" height="15" rx="3" fill="none"/>
      <line x1="-5" y1="-13" x2="-5" y2="-9"/>
      <line x1="5"  y1="-13" x2="5"  y2="-9"/>
      <line x1="-11" y1="0" x2="-15" y2="0"/>
      <line x1="11" y1="0" x2="15" y2="0"/>
    </g>
    <text id="lbl-grid-val" x="0" y="12" text-anchor="middle" class="node-value">0<tspan class="node-value-unit" dx="2">kW</tspan></text>
    <text x="0" y="30" text-anchor="middle" class="node-label">Netz</text>
  </g>

  <!-- ── Last ── -->
  <g class="node" id="node-house" transform="translate(355,270)">
    <circle class="node-glow" r="50"/>
    <circle class="node-ring" r="50"/>
    <g class="node-icon" transform="translate(0,-16)" stroke-width="2" fill="none">
      <polygon points="0,-13 15,-1 15,13 -15,13 -15,-1" fill="none"/>
    </g>
    <text id="lbl-house-val" x="0" y="12" text-anchor="middle" class="node-value">0<tspan class="node-value-unit" dx="2">kW</tspan></text>
    <text x="0" y="30" text-anchor="middle" class="node-label">Last</text>
  </g>

  <!-- ── Batterie ── -->
  <g class="node" id="node-bat" transform="translate(205,420)">
    <circle class="node-glow" r="54"/>
    <circle class="node-ring" r="54"/>
    <g class="node-icon" transform="translate(0,-24)" stroke-width="2" fill="none">
      <rect x="-11" y="-8" width="19" height="16" rx="2.5" fill="none"/>
      <rect x="8" y="-4" width="3.5" height="8" rx="1" stroke="none"/>
      <rect id="bat-fill" x="-9" y="-6" width="15" height="12" rx="1.5" opacity="0.4" stroke="none"/>
      <g id="bat-badge" transform="translate(-14,-14)">
        <circle r="6" stroke="none"/>
        <line x1="-3" y1="0" x2="3" y2="0" stroke="#14171c" stroke-width="1.6"/>
        <line id="bat-badge-vert" x1="0" y1="-3" x2="0" y2="3" stroke="#14171c" stroke-width="1.6"/>
      </g>
    </g>
    <text id="lbl-bat-soc" x="0" y="4" text-anchor="middle" class="node-soc">–%</text>
    <text x="0" y="22" text-anchor="middle" class="node-label">Batterie</text>
    <text id="lbl-bat-val" x="0" y="39" text-anchor="middle" class="node-sub">0<tspan class="node-value-unit" dx="2">kW</tspan></text>
  </g>

</svg>
</div>

<script>
const C_SOLAR = [255, 179, 0];   // Sonnengelb
const C_BAT   = [33, 150, 243];  // Blau
const C_GREEN = [67, 160, 71];   // Einspeisung / lokal versorgt
const C_RED   = [229, 57, 53];   // Bezug / netzversorgt
const C_GREY  = [158, 158, 158];

function rgb(c) { return 'rgb(' + c[0] + ',' + c[1] + ',' + c[2] + ')'; }
function lerp(a, b, t) {
  t = Math.max(0, Math.min(1, t));
  return [
    Math.round(a[0] + (b[0] - a[0]) * t),
    Math.round(a[1] + (b[1] - a[1]) * t),
    Math.round(a[2] + (b[2] - a[2]) * t),
  ];
}

function fmtKw(w) {
  const kw = (w || 0) / 1000;
  return kw.toLocaleString('de-DE', { minimumFractionDigits: 3, maximumFractionDigits: 3 });
}

function setValueText(id, watts) {
  document.getElementById(id).firstChild.nodeValue = fmtKw(watts);
}

// Setzt Knotenfarbe (--nc), Glow (nur wenn aktiv) und Grau-Fallback ohne Daten
function setNode(nodeId, have, active, color) {
  const el = document.getElementById(nodeId);
  const c = have ? color : C_GREY;
  el.style.setProperty('--nc', rgb(c));
  el.querySelector('.node-glow').style.stroke = (have && active)
    ? 'rgba(' + c[0] + ',' + c[1] + ',' + c[2] + ',0.55)'
    : 'var(--grey-glow)';
}

function setFlow(idOut, idIn, active, reverse, color, markerId) {
  const col = rgb(color);
  const out = document.getElementById(idOut);
  out.classList.toggle('active', active && !reverse);
  out.style.stroke = col;
  if (idIn) {
    const inn = document.getElementById(idIn);
    inn.classList.toggle('active', active && reverse);
    inn.style.stroke = col;
  }
  // <marker>-Inhalte erben Farben nicht automatisch von der referenzierenden
  // Linie (kein CSS-Vererbungskontext) - Pfeilspitze daher explizit einfärben.
  if (markerId) {
    const m = document.querySelector('#' + markerId + ' path');
    if (m) m.style.fill = col;
  }
}

function handleMessage(raw) {
  const d = typeof raw === 'string' ? JSON.parse(raw) : raw;

  const root = document.documentElement;
  if (d.bg)        document.body.style.background = d.bg;
  if (d.font)      root.style.setProperty('--font', d.font);
  if (d.scale)     root.style.setProperty('--scale', d.scale);

  const dot = document.getElementById('dot');
  dot.className = 'status-dot' + (d.ok ? ' ok pulse' : '');
  document.getElementById('stateLabel').textContent = d.stateLabel ?? '–';

  if (!d.ok) return;

  const pvW    = d.pvW    ?? 0;
  const gridW  = d.gridW  ?? 0;  // >0 Einspeisung, <0 Bezug
  const houseW = d.houseW ?? 0;  // stets >=0 (Last)
  const batW   = d.batW   ?? 0;  // >0 Laden, <0 Entladen

  const pvActive    = d.pvHave    && Math.abs(pvW)    > 20;
  const gridActive  = d.gridHave  && Math.abs(gridW)  > 20;
  const houseActive = d.houseHave && houseW > 20;
  const batActive   = d.batHave   && Math.abs(batW)   > 20;

  // Solar: immer Sonnengelb
  setValueText('lbl-pv-val', Math.abs(pvW));
  setNode('node-pv', d.pvHave, pvActive, C_SOLAR);
  setFlow('wf-pv-out', 'wf-pv-in', pvActive, false, C_SOLAR, 'arrow-pv');

  // Netz: Einspeisung = Grün, Bezug = Rot
  setValueText('lbl-grid-val', Math.abs(gridW));
  const gridColor = gridW >= 0 ? C_GREEN : C_RED;
  setNode('node-grid', d.gridHave, gridActive, gridColor);
  setFlow('wf-nz-out', 'wf-nz-in', gridActive, gridW < 0, gridColor, 'arrow-nz');

  // Last: moderater Farbverlauf je nach Quellenanteil (Netzbezug -> Rot,
  // PV/Batterie-gedeckt -> Grün)
  setValueText('lbl-house-val', houseW);
  const gridImportW = (d.gridHave && gridW < 0) ? Math.abs(gridW) : 0;
  const gridShare   = houseW > 0 ? Math.min(1, gridImportW / houseW) : 0;
  const houseColor  = lerp(C_GREEN, C_RED, gridShare);
  setNode('node-house', d.houseHave, houseActive, houseColor);
  setFlow('wf-ls-out', null, houseActive, false, houseColor, 'arrow-ls');

  // Batterie: immer Blau
  setValueText('lbl-bat-val', Math.abs(batW));
  setNode('node-bat', d.batHave, batActive, C_BAT);
  setFlow('wf-bt-out', 'wf-bt-in', batActive, batW < 0, C_BAT, 'arrow-bt');

  const badgeVisible = d.batHave && batW >= 20;
  document.getElementById('bat-badge').style.display = badgeVisible ? '' : 'none';
  document.getElementById('bat-badge-vert').style.display = (d.batHave && batW < -20) ? 'none' : '';

  const socEl = document.getElementById('lbl-bat-soc');
  if (d.socHave) {
    socEl.textContent = Math.round(d.soc) + '%';
    const pct = Math.max(0, Math.min(100, d.soc)) / 100;
    const fill = document.getElementById('bat-fill');
    fill.setAttribute('height', (12 * pct).toFixed(1));
    fill.setAttribute('y', (6 - 12 * pct).toFixed(1));
  } else {
    socEl.textContent = '–%';
  }
}
</script>
</body>
</html>
