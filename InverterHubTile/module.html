<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root {
    --accent: #4caf50;
    --box: rgba(255,255,255,0.06);
    --text: inherit;
    --textmuted: rgba(128,128,128,0.85);
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    --scale: 1;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    font-size: calc(13px * var(--scale));
    background: transparent;
    color: var(--text);
    padding: 46px 18px 16px;
    user-select: none;
    min-height: 100%;
  }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 10px;
    font-size: calc(11px * var(--scale));
    color: var(--textmuted);
  }
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--textmuted);
    flex-shrink: 0;
  }
  .status-dot.ok { background: var(--accent); }
  .status-dot.pulse { animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50%      { opacity: 0.35; }
  }
  .state-label { font-weight: 600; color: var(--text); }

  .flow-wrap {
    position: relative;
    width: 100%;
    max-width: 320px;
    margin: 0 auto;
  }
  .flow-svg { width: 100%; height: auto; display: block; }

  .node-label {
    font-size: calc(10px * var(--scale));
    fill: var(--textmuted);
  }
  .node-value {
    font-size: calc(15px * var(--scale));
    font-weight: 700;
    fill: var(--text);
  }

  .flow-path {
    fill: none;
    stroke-width: 2.5;
    stroke-linecap: round;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .flow-path.active { opacity: 1; }

  .node-ring {
    fill: none;
    stroke-width: 2.5;
    transition: stroke 0.3s;
  }

  .node-icon { transition: opacity 0.3s; }
  .node-icon.dim { opacity: 0.25; }

  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="status-bar">
  <span class="status-dot" id="dot"></span>
  <span class="state-label" id="stateLabel">–</span>
</div>

<div class="flow-wrap">
<svg class="flow-svg" viewBox="0 0 300 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>text { font-family: var(--font); }</style>
    <!-- Pfade für Teilchen-Animation -->
    <path id="p-pv-grid"  d="M150,95 L75,175"  />
    <path id="p-pv-house" d="M150,95 L225,175" />
    <path id="p-pv-bat"   d="M150,95 L150,265" />
    <path id="p-bat-house" d="M150,265 L225,175" />
    <path id="p-grid-house" d="M75,175 L225,175" />
  </defs>

  <!-- ── Verbindungslinien (immer sichtbar, gedimmt) ── -->
  <line x1="150" y1="95"  x2="75"  y2="175" stroke="rgba(128,128,128,0.18)" stroke-width="2"/>
  <line x1="150" y1="95"  x2="225" y2="175" stroke="rgba(128,128,128,0.18)" stroke-width="2"/>
  <line x1="150" y1="95"  x2="150" y2="265" stroke="rgba(128,128,128,0.18)" stroke-width="2"/>

  <!-- ── Aktive Fluss-Linien ── -->
  <line id="fl-grid" x1="150" y1="95" x2="75"  y2="175" class="flow-path" style="stroke:#66bb6a"/>
  <line id="fl-house" x1="150" y1="95" x2="225" y2="175" class="flow-path" style="stroke:#ff9800"/>
  <line id="fl-bat"  x1="150" y1="95" x2="150" y2="265" class="flow-path" style="stroke:#42a5f5"/>

  <!-- ── Teilchen ── -->
  <circle id="pt-grid" r="3.5" fill="#66bb6a" />
  <circle id="pt-house" r="3.5" fill="#ff9800" />
  <circle id="pt-bat"  r="3.5" fill="#42a5f5" />

  <!-- ── Solar (oben) ── -->
  <g transform="translate(150,95)">
    <circle class="node-ring" r="38" style="stroke:var(--accent)" id="ring-pv" fill="rgba(76,175,80,0.08)"/>
    <g class="node-icon" id="icon-pv" transform="translate(0,-18)">
      <circle r="8" fill="var(--accent)"/>
      <line x1="-12" y1="0"  x2="-9" y2="0"  stroke="var(--accent)" stroke-width="2"/>
      <line x1="9"   y1="0"  x2="12" y2="0"  stroke="var(--accent)" stroke-width="2"/>
      <line x1="0"   y1="-12" x2="0" y2="-9" stroke="var(--accent)" stroke-width="2"/>
      <line x1="-8"  y1="-8" x2="-6" y2="-6" stroke="var(--accent)" stroke-width="2"/>
      <line x1="6"   y1="-6" x2="8"  y2="-8" stroke="var(--accent)" stroke-width="2"/>
      <line x1="-8"  y1="8"  x2="-6" y2="6"  stroke="var(--accent)" stroke-width="2"/>
      <line x1="6"   y1="6"  x2="8"  y2="8"  stroke="var(--accent)" stroke-width="2"/>
    </g>
    <text id="lbl-pv-val" x="0" y="10" text-anchor="middle" class="node-value">0 kW</text>
    <text x="0" y="26" text-anchor="middle" class="node-label">Solar</text>
  </g>

  <!-- ── Netz (links) ── -->
  <g transform="translate(75,175)">
    <circle class="node-ring" r="38" id="ring-grid" fill="rgba(128,128,128,0.05)"/>
    <g class="node-icon" id="icon-grid" transform="translate(0,-18)">
      <rect x="-11" y="-9" width="22" height="16" rx="3" fill="none" stroke="#66bb6a" stroke-width="1.5"/>
      <line x1="-5" y1="-12" x2="-5" y2="-9" stroke="#66bb6a" stroke-width="2"/>
      <line x1="5"  y1="-12" x2="5"  y2="-9" stroke="#66bb6a" stroke-width="2"/>
    </g>
    <text id="lbl-grid-val" x="0" y="10" text-anchor="middle" class="node-value">0 kW</text>
    <text x="0" y="26" text-anchor="middle" class="node-label">Netz</text>
  </g>

  <!-- ── Last (rechts) ── -->
  <g transform="translate(225,175)">
    <circle class="node-ring" r="38" id="ring-house" fill="rgba(128,128,128,0.05)"/>
    <g class="node-icon" id="icon-house" transform="translate(0,-18)">
      <polygon points="0,-11 12,0 12,11 -12,11 -12,0" fill="none" stroke="#ff9800" stroke-width="1.5"/>
      <polygon points="0,-11 -13,1 13,1" fill="none" stroke="#ff9800" stroke-width="1.5"/>
    </g>
    <text id="lbl-house-val" x="0" y="10" text-anchor="middle" class="node-value">0 kW</text>
    <text x="0" y="26" text-anchor="middle" class="node-label">Last</text>
  </g>

  <!-- ── Batterie (unten) ── -->
  <g transform="translate(150,265)">
    <circle class="node-ring" r="38" id="ring-bat" fill="rgba(128,128,128,0.05)"/>
    <g class="node-icon" id="icon-bat" transform="translate(0,-20)">
      <rect x="-10" y="-8" width="18" height="15" rx="2.5" fill="none" stroke="#42a5f5" stroke-width="1.5"/>
      <rect x="8"   y="-4" width="3"  height="7"  rx="1"   fill="#42a5f5" opacity="0.6"/>
      <rect id="bat-fill" x="-8" y="-6" width="9" height="11" rx="1.5" fill="#42a5f5" opacity="0.5"/>
    </g>
    <text id="lbl-bat-soc" x="0" y="8" text-anchor="middle" class="node-value">–%</text>
    <text id="lbl-bat-val" x="0" y="24" text-anchor="middle" class="node-label">Batterie</text>
  </g>

</svg>
</div>

<script>
function fmtW(w) {
  if (w == null) return '–';
  const abs = Math.abs(w);
  if (abs >= 1000) return (w / 1000).toFixed(2) + ' kW';
  return Math.round(w) + ' W';
}

let ptAnim = {};

function animateParticle(id, pathId, color, durationMs, reverse) {
  const pt = document.getElementById(id);
  const key = id + (reverse ? 'r' : 'f');
  if (ptAnim[key]) return;

  const pathEl = document.getElementById(pathId);
  const d = pathEl.getAttribute('d');
  pt.style.offsetPath = 'path("' + d + '")';
  pt.style.offsetDistance = '0%';
  pt.style.fill = color;
  pt.style.opacity = '0.9';

  let start = null;
  function step(ts) {
    if (!start) start = ts;
    let t = ((ts - start) % durationMs) / durationMs;
    if (reverse) t = 1 - t;
    pt.style.offsetDistance = (t * 100).toFixed(1) + '%';
    ptAnim[key] = requestAnimationFrame(step);
  }
  ptAnim[key] = requestAnimationFrame(step);
}

function stopParticle(id) {
  ['f','r'].forEach(s => {
    const key = id + s;
    if (ptAnim[key]) { cancelAnimationFrame(ptAnim[key]); delete ptAnim[key]; }
  });
  document.getElementById(id).style.opacity = '0';
}

function setNode(prefix, have, ringColor) {
  document.getElementById('ring-' + prefix).style.stroke = have ? ringColor : 'rgba(128,128,128,0.25)';
  document.getElementById('icon-' + prefix).classList.toggle('dim', !have);
}

function handleMessage(raw) {
  const d = typeof raw === 'string' ? JSON.parse(raw) : raw;

  const root = document.documentElement;
  if (d.accent)    root.style.setProperty('--accent', d.accent);
  if (d.bg)        document.body.style.background = d.bg;
  if (d.box)       root.style.setProperty('--box', d.box);
  if (d.text)      root.style.setProperty('--text', d.text);
  if (d.textmuted) root.style.setProperty('--textmuted', d.textmuted);
  if (d.font)      root.style.setProperty('--font', d.font);
  if (d.scale)     root.style.setProperty('--scale', d.scale);

  const dot = document.getElementById('dot');
  dot.className = 'status-dot' + (d.ok ? ' ok pulse' : '');
  document.getElementById('stateLabel').textContent = d.stateLabel ?? '–';

  if (!d.ok) return;

  const accentColor = getComputedStyle(root).getPropertyValue('--accent').trim() || '#4caf50';

  // Solar
  setNode('pv', !!d.pvHave, accentColor);
  document.getElementById('lbl-pv-val').textContent = d.pvHave ? fmtW(d.pvW) : '–';

  // Netz: negativ = Bezug (Fluss Netz→WR wäre eigentlich umgekehrt, hier
  // vereinfacht als reine "Einspeisung/Bezug"-Größe ohne Richtungspfeil,
  // da die Fluss-Linie WR→Netz optisch dem Screenshot-Vorbild entspricht)
  setNode('grid', !!d.gridHave, '#66bb6a');
  document.getElementById('lbl-grid-val').textContent = d.gridHave ? fmtW(Math.abs(d.gridW)) : '–';
  const gridActive = d.gridHave && Math.abs(d.gridW) > 20;
  document.getElementById('fl-grid').classList.toggle('active', gridActive);
  if (gridActive) animateParticle('pt-grid', 'p-pv-grid', '#66bb6a', 1400, d.gridW < 0);
  else stopParticle('pt-grid');

  // Last
  setNode('house', !!d.houseHave, '#ff9800');
  document.getElementById('lbl-house-val').textContent = d.houseHave ? fmtW(d.houseW) : '–';
  const houseActive = d.houseHave && d.houseW > 20;
  document.getElementById('fl-house').classList.toggle('active', houseActive);
  if (houseActive) animateParticle('pt-house', 'p-pv-house', '#ff9800', 1300, false);
  else stopParticle('pt-house');

  // Batterie
  setNode('bat', !!d.batHave, '#42a5f5');
  document.getElementById('lbl-bat-val').textContent = d.batHave ? fmtW(Math.abs(d.batW)) : 'Batterie';
  document.getElementById('lbl-bat-soc').textContent = d.socHave ? Math.round(d.soc) + '%' : (d.batHave ? fmtW(Math.abs(d.batW)) : '–%');
  const batActive = d.batHave && Math.abs(d.batW) > 20;
  document.getElementById('fl-bat').classList.toggle('active', batActive);
  if (batActive) animateParticle('pt-bat', 'p-pv-bat', '#42a5f5', 1200, d.batW < 0);
  else stopParticle('pt-bat');

  // Batterie-Füllstand im Icon
  if (d.socHave) {
    const pct = Math.max(0, Math.min(100, d.soc)) / 100;
    document.getElementById('bat-fill').setAttribute('height', (11 * pct).toFixed(1));
    document.getElementById('bat-fill').setAttribute('y', (5 - 11 * pct).toFixed(1));
  }
}
</script>
</body>
</html>
