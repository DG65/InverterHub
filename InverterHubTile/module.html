<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root {
    --grey: rgba(158,158,158,0.85);
    --grey-glow: rgba(158,158,158,0);
    --wire: rgba(150,150,150,0.42);
    --ring-decor: rgba(190,190,190,0.55);
    --text: inherit;
    --textmuted: rgba(158,158,158,0.9);
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  /* Alles liegt in EINEM SVG mit viewBox, damit die gesamte Kachel beim
     Skalieren des Widgets als Einheit mitwächst. Absolute Positionierung
     statt Flexbox, da ein Flex-Kind mit width/height:100% in manchen
     Kachel-Hosts nicht zuverlässig auf die tatsächliche Containergröße
     schrumpft und dadurch Inhalt am Rand abgeschnitten wurde. */
  html, body { width: 100%; height: 100%; background: transparent; user-select: none; overflow: hidden; }
  body { position: relative; }

  /* width/height werden zusätzlich per JS als explizite Pixel-Attribute
     gesetzt (siehe syncSvgSize) - in manchen Kachel-Hosts wird die 100%-Höhe
     nicht zuverlässig bis zum <body> durchgereicht, wodurch preserveAspectRatio
     gegen eine falsche (zu große) Fläche skalierte und Inhalt am Rand
     abgeschnitten wurde, besonders bei kleinen Kachelgrößen. */
  .flow-svg { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }

  text { font-family: var(--font); }

  .status-dot { fill: var(--textmuted); }
  .status-dot.ok { fill: #4caf50; }
  .status-dot.pulse { animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
  .state-label { font-size: 15px; font-weight: 600; fill: var(--textmuted); }

  /* Fill/Stroke sind vererbbare CSS-Eigenschaften bei SVG (im Gegensatz zu
     "color"/currentColor) - Icon-Kinder erben --nc automatisch. */
  .node-icon, .node-icon * { fill: var(--nc, var(--grey)); stroke: var(--nc, var(--grey)); }
  .node-icon rect[data-hollow], .node-icon polygon[data-hollow] { fill: none; }

  /* Striktes, überall identisches Template: Icon -> Wert -> Label, in genau
     dieser Reihenfolge und mit denselben Abständen für JEDEN Knoten. */
  .node-value { font-size: 22px; font-weight: 800; fill: var(--nc, var(--grey)); }
  /* em statt fixer px-Größe: skaliert automatisch mit der Wertschrift und
     nutzt dieselbe Farbe (--nc) statt einer eigenen, gedämpften Farbe. */
  .node-value-unit { font-size: 0.52em; font-weight: 600; fill: var(--nc, var(--grey)); }
  .node-label { font-size: 12.5px; fill: var(--textmuted); }
  .node-sub { font-size: 10px; font-weight: 700; }

  .wire { fill: none; stroke: var(--wire); stroke-width: 2.5; stroke-linecap: round; }
  .wire-flow {
    fill: none; stroke-width: 3; stroke-linecap: round;
    stroke-dasharray: 1 10; opacity: 0; transition: opacity 0.35s;
  }
  .wire-flow.active { opacity: 1; animation: dash 900ms linear infinite; }
  .wire-flow.reverse { animation-direction: reverse; }
  @keyframes dash { to { stroke-dashoffset: -22; } }

  /* Kollektor-Ring: bewusst kräftiger als die dünnen Speichen, damit er als
     eigenständiges Gestaltungselement erkennbar bleibt. */
  .ring-decor { fill: none; stroke: var(--ring-decor); stroke-width: 3.5; stroke-dasharray: 2 6; }

  .node-glow { fill: none; stroke-width: 13; filter: blur(8px); }
  .node-ring { fill: #14171c; stroke-width: 3; stroke: var(--nc, var(--grey)); }

  /* --- Münz-/Schlaglicht-Ebenen (nur für aktive Knoten) --- */
  /* Dunkle Bodenschattierung leicht nach unten versetzt, damit der Kreis wie
     eine erhabene Münze über der Fläche schwebt. */
  .coin-shadow { fill: #000; opacity: 0.5; filter: blur(8px); }
  /* Metallischer Kantenanschliff: heller Lichtfang oben-links, dunkler
     Schatten unten-rechts (bevelGrad), überlagert den farbigen Ring, sodass
     die Identitätsfarbe in den Mitteltönen erhalten bleibt. */
  .node-bevel { fill: none; stroke: url(#bevelGrad); stroke-width: 5; }
  /* Weiches, großes Glanzlicht oben links (diffuse Wölbung). */
  .node-highlight { fill: #fff; opacity: 0.13; filter: blur(6px); }
  /* Kleiner, knackiger Glint - wie Licht, das auf die Münzkante trifft. */
  .node-spec { fill: #fff; opacity: 0.30; filter: blur(2px); }
</style>
</head>
<body>

<svg class="flow-svg" id="svg" viewBox="0 0 560 580" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <defs id="markerDefs"></defs>
  <defs>
    <!-- Münz-Look für AKTIVE Kreise. Inaktive Kreise bleiben bewusst flach
       (fill:none), wie bisher. -->
    <!-- Gewölbte Fläche: Licht kommt von oben-links, dadurch heller Scheitel
       oben-links und dunkler abfallender Rand unten-rechts. -->
    <radialGradient id="plasticFill" cx="33%" cy="25%" r="88%">
      <stop offset="0%"   stop-color="#3d4655"/>
      <stop offset="42%"  stop-color="#1d222b"/>
      <stop offset="100%" stop-color="#070a0e"/>
    </radialGradient>
    <!-- Kanten-Anschliff der Münze: gerichtetes Licht von oben-links nach
       unten-rechts (weiß -> transparent -> schwarz). objectBoundingBox, also
       fest achsparallel = konstante Lichtrichtung. -->
    <linearGradient id="bevelGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="28%"  stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="70%"  stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.65"/>
    </linearGradient>
    <!-- Prägung (Relief) für Icons und Leistungswerte: heller Grat oben-links,
       dunkler Schatten unten-rechts, Original obenauf - wie in eine Münze
       geprägt. -->
    <filter id="relief" x="-45%" y="-45%" width="190%" height="190%">
      <feOffset in="SourceAlpha" dx="-0.6" dy="-0.7" result="ha"/>
      <feFlood flood-color="#ffffff" flood-opacity="0.5"/>
      <feComposite in2="ha" operator="in" result="hl"/>
      <feOffset in="SourceAlpha" dx="0.7" dy="0.9" result="sa"/>
      <feFlood flood-color="#000000" flood-opacity="0.55"/>
      <feComposite in2="sa" operator="in" result="sh"/>
      <feMerge>
        <feMergeNode in="sh"/>
        <feMergeNode in="hl"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Statuszeile: Position ist an die Diagramm-Geometrie gekoppelt (knapp
       oberhalb/links von Solar- und Verluste-Kreis), nicht an einen
       willkürlichen Fixpunkt in der viewBox. -->
  <!-- Punkt exakt linksbündig mit dem Verluste-Kreis (CX-R_OUTER-ACTIVE_R) und
       obenbündig mit dem Solar-Kreis (CY-R_OUTER-ACTIVE_R), bezogen auf deren
       MAXIMALE (aktive) Größe, damit der Punkt nicht mitwandert, wenn ein
       Knoten inaktiv/kleiner wird. -->
  <circle id="dot" class="status-dot" cx="52.5" cy="73.5" r="6.5"/>
  <text id="stateLabel" x="66" y="78.5" class="state-label">–</text>

  <!-- Dynamischer Inhalt: Speichen zuerst (unten), dann Knoten (oben) -->
  <g id="wires-layer"></g>

  <!-- Zentrum: Hauslast, immer vorhanden. Kollektor-Ring (für den Moment
       ausgeblendet, siehe SHOW_RING in <script>) liegt etwa mittig zwischen
       Zentrums- und äußeren Kreisen (siehe R_RING/R_CENTER/R_OUTER). -->
  <circle class="ring-decor" id="ring-decor" cx="280" cy="301" r="96" style="display:none"/>
  <g id="node-center" transform="translate(280,301)">
    <circle id="center-shadow" class="coin-shadow" cx="0" cy="8.96" r="54.88" style="display:none"/>
    <circle class="node-glow" r="56"/>
    <circle class="node-ring" r="56"/>
    <circle id="center-bevel" class="node-bevel" r="56" style="display:none"/>
    <ellipse id="center-highlight" class="node-highlight" cx="-16.8" cy="-26.9" rx="25.8" ry="14.6" style="display:none"/>
    <ellipse id="center-spec" class="node-spec" cx="-24.6" cy="-30.8" rx="11.2" ry="6.2" style="display:none"/>
    <g id="center-icon" class="node-icon" transform="translate(0,-30)" stroke-width="2" fill="none">
      <polygon points="0,-12 13.6,-0.8 13.6,12 -13.6,12 -13.6,-0.8" data-hollow="1"/>
    </g>
    <text id="lbl-center-val" x="0" y="9" text-anchor="middle" class="node-value">0<tspan class="node-value-unit" dx="2">kW</tspan></text>
    <text x="0" y="28" text-anchor="middle" class="node-label">Hauslast</text>
  </g>

  <g id="nodes-layer"></g>
</svg>

<script>
// Pfeile/Lauflinien und der große Kollektor-Ring sind für den Moment
// ausgeblendet (Nutzerwunsch) - auf true setzen, um beides wieder zu zeigen;
// der ring-decor-Kreis selbst wird zusätzlich per style="display:none" im
// Markup ausgeblendet.
const SHOW_FLOW = false;

const CX = 280, CY = 301;          // Zentrum
const R_RING = 96;                 // Kollektorring-Radius
// Aktive Knoten sind alle gleich groß; inaktive (kein nennenswerter Fluss)
// werden bewusst kleiner gezeichnet - der Größenunterschied selbst ist das
// gewünschte Signal für "inaktiv", nicht nur Farbe/Transparenz.
const ACTIVE_R   = 56;
const INACTIVE_R = 44;
const R_OUTER  = 178;              // Abstand der äußeren Knoten vom Zentrum

const C_SOLAR = [255, 179, 0];
const C_BAT   = [33, 150, 243];
const C_GREEN = [67, 160, 71];
const C_RED   = [229, 57, 53];
const C_GREY  = [158, 158, 158];

function rgb(c) { return 'rgb(' + c[0] + ',' + c[1] + ',' + c[2] + ')'; }
function lerp(a, b, t) {
  t = Math.max(0, Math.min(1, t));
  return [
    Math.round(a[0] + (b[0]-a[0])*t), Math.round(a[1] + (b[1]-a[1])*t), Math.round(a[2] + (b[2]-a[2])*t)
  ];
}
function fmtKw(w) {
  const kw = (w || 0) / 1000;
  return kw.toLocaleString('de-DE', { minimumFractionDigits: 3, maximumFractionDigits: 3 });
}
function glowAlpha(magnitudeW, refW) {
  const t = Math.max(0, Math.min(1, magnitudeW / refW));
  return 0.14 + Math.sqrt(t) * 0.5;
}
const SVGNS = 'http://www.w3.org/2000/svg';
function el(tag, attrs) {
  const e = document.createElementNS(SVGNS, tag);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  return e;
}

// CSS-Prozentangaben (width/height:100%) verlassen sich darauf, dass der
// Kachel-Host dem <body> zuverlässig seine tatsächliche Pixelgröße
// durchreicht - das ist in der IP-Symcon-Kachel-Ansicht nicht immer der
// Fall, besonders bei kleinen Widget-Größen, wodurch preserveAspectRatio
// gegen eine falsche (zu große) Fläche skalierte und Inhalt am Rand
// abgeschnitten wurde. Die tatsächliche Größe wird daher aktiv gemessen und
// als explizite Pixel-Attribute auf dem <svg> gesetzt.
function syncSvgSize() {
  const svg = document.getElementById('svg');
  const w = window.innerWidth || document.documentElement.clientWidth || 1;
  const h = window.innerHeight || document.documentElement.clientHeight || 1;
  svg.setAttribute('width', w);
  svg.setAttribute('height', h);
}
window.addEventListener('resize', syncSvgSize);
if (window.ResizeObserver) {
  new ResizeObserver(syncSvgSize).observe(document.documentElement);
}
syncSvgSize();

// --- Münz-/Schlaglicht-Ebenen (nur für aktive Knoten) ---
// Dunkle Bodenschattierung leicht nach unten versetzt - die Münze schwebt.
function makeCoinShadow(r) {
  return el('circle', { class: 'coin-shadow', cx: 0, cy: r * 0.16, r: r * 0.98 });
}
// Metallischer Kantenanschliff (siehe #bevelGrad).
function makeBevel(r) {
  return el('circle', { class: 'node-bevel', r: r });
}
// Weiches, großes Glanzlicht oben links (diffuse Wölbung).
function makeHighlight(r) {
  return el('ellipse', {
    class: 'node-highlight',
    cx: -r * 0.30, cy: -r * 0.48, rx: r * 0.46, ry: r * 0.26,
  });
}
// Kleiner, knackiger Glint auf der Kante oben-links.
function makeSpecular(r) {
  return el('ellipse', {
    class: 'node-spec',
    cx: -r * 0.44, cy: -r * 0.55, rx: r * 0.2, ry: r * 0.11,
  });
}

// <marker>-Inhalte erben KEINE Farbe von der referenzierenden Linie (kein
// CSS-Vererbungskontext für SVG-Marker) - pro Knoten wird daher ein eigenes,
// bereits passend eingefärbtes Marker-Element angelegt statt eines einzigen
// globalen Pfeils (der zuvor von allen Knoten geteilt wurde und dadurch nur
// in einer Farbe bzw. Schwarz erschien).
function makeMarker(id, color) {
  // markerUnits fehlte -> Default "strokeWidth" skaliert die Pfeilspitze mit
  // der Linienstärke (3), aus 9px wurden faktisch 27px, die über den Ring
  // hinausragten. refX lag zudem in der Dreiecksmitte statt an der Spitze,
  // wodurch der Pfeil über den eigentlichen Linienendpunkt hinausschoss.
  const m = el('marker', {
    id, markerWidth: 10, markerHeight: 10, refX: 10, refY: 5,
    orient: 'auto', markerUnits: 'userSpaceOnUse',
  });
  const p = el('path', { d: 'M0,0 L10,5 L0,10 Z' });
  p.style.fill = rgb(color);
  m.appendChild(p);
  return m;
}

// -- Icon-Zeichner: jeweils eine Gruppe von Kindelementen, im 32x32-Raster
//    zentriert auf (0,0), wird an fester Position translate(0,-16) verankert.
const ICONS = {
  sun(g) {
    g.appendChild(el('circle', { r: 7, stroke: 'none' }));
    const rays = [[0,-13,0,-10],[0,10,0,13],[-13,0,-10,0],[10,0,13,0],
      [-9.2,-9.2,-7,-7],[7,7,9.2,9.2],[-9.2,9.2,-7,7],[7,-7,9.2,-9.2]];
    rays.forEach(([x1,y1,x2,y2]) => g.appendChild(el('line', { x1,y1,x2,y2 })));
  },
  bolt(g) {
    g.appendChild(el('polygon', {
      points: '2,-12 -6.5,2 -1,2 -2.7,12 7.3,-2 2,-2', 'data-hollow': '1',
      'stroke-linejoin': 'round', 'stroke-linecap': 'round'
    }));
  },
  house(g) {
    g.appendChild(el('polygon', { points: '0,-15 17,-1 17,15 -17,15 -17,-1', 'data-hollow': '1' }));
  },
  battery(g, socPct) {
    // Breiter, liegender Body - der Füllstand (SOC) wird als horizontaler
    // Balken direkt im Icon dargestellt, der Prozentwert steht mittig
    // darüber geschrieben direkt IM Icon (nicht mehr separat daneben).
    g.appendChild(el('rect', { x: -20, y: -11, width: 37, height: 22, rx: 3, 'data-hollow': '1' }));
    g.appendChild(el('rect', { x: 17, y: -5.5, width: 5, height: 11, rx: 1.3, stroke: 'none' }));
    if (socPct != null) {
      const pct = Math.max(0, Math.min(100, socPct)) / 100;
      const fillW = 31 * pct;
      g.appendChild(el('rect', { x: -18, y: -9, width: fillW, height: 18, rx: 1.8, opacity: 0.4, stroke: 'none' }));
      const t = el('text', { x: -1.5, y: 4, 'text-anchor': 'middle', 'font-size': 12, 'font-weight': 800 });
      t.style.fill = '#fff';
      t.style.stroke = 'none';
      t.textContent = Math.round(socPct) + '%';
      g.appendChild(t);
    }
  },
  flame(g) {
    g.appendChild(el('path', {
      d: 'M0,-9.6 C4.44,-3.36 4.44,1.08 0,4.44 C1.32,1.08 -1.08,0 -1.08,2.28 C-2.28,-1.08 -3.36,-4.44 0,-9.6 Z',
      'stroke-linejoin': 'round'
    }));
  },
};

// -- Node-Definitionen: legen fest, welche äußeren Knoten grundsätzlich
//    existieren können. "have"/"w" verweisen auf Felder im Payload. Jeder
//    Knotentyp hat eine FESTE Winkelposition (nicht mehr gleichmäßig über
//    360°/Anzahl verteilt) - Solar so weit oben wie möglich, Netz so weit
//    unten wie möglich, Batterie rechts, Verluste links. Künftige Verbraucher
//    (Wallbox, Wärmepumpe, ...) bekommen hier einfach eigene freie Winkel
//    zugewiesen (z. B. -45/-135 zwischen Solar und Batterie/Verluste).
const NODE_DEFS = [
  { key: 'pv',   label: 'Solar',    icon: 'sun',     have: 'pvHave',   w: 'pvW',   angle: -90,
    color: () => C_SOLAR, dir: () => 'in' },
  { key: 'bat',  label: 'Batterie', icon: 'battery', have: 'batHave',  w: 'batW',  angle: 0,
    color: () => C_BAT, dir: (w) => w > 0 ? 'in' : 'out', battery: true },
  { key: 'grid', label: 'Netz',     icon: 'bolt',    have: 'gridHave', w: 'gridW', angle: 90,
    color: (w) => w >= 0 ? C_GREEN : C_RED, dir: (w) => w >= 0 ? 'out' : 'in' },
  { key: 'loss', label: 'Verluste', icon: 'flame',   have: 'lossHave', w: 'lossW', angle: 180,
    color: () => C_GREY, dir: () => 'out', grey: true, minMagnitude: 15 },
];

function setValueText(textEl, watts) {
  textEl.firstChild.nodeValue = fmtKw(watts);
}

function buildOuterNode(def, angleDeg, d, markerDefs) {
  const rad = angleDeg * Math.PI / 180;
  const cx = CX + R_OUTER * Math.cos(rad);
  const cy = CY + R_OUTER * Math.sin(rad);
  const w = d[def.w] ?? 0;
  const magnitude = Math.abs(w);
  const have = !!d[def.have];
  const active = have && magnitude > (def.minMagnitude ?? 20);
  // Aktive Knoten sind alle gleich groß (ACTIVE_R); inaktive werden bewusst
  // kleiner gezeichnet (INACTIVE_R). Damit dabei nicht nur der Ring schrumpft
  // sondern wirklich der GESAMTE Kreisinhalt (Icon, Wert, Beschriftung)
  // proportional mitskaliert, wird Ring/Glow immer bei ACTIVE_R gezeichnet
  // und stattdessen die komplette Knoten-Gruppe per CSS-Transform skaliert -
  // die effektive (sichtbare) Größe ist dieselbe wie zuvor, nur skaliert
  // jetzt alles gemeinsam statt nur der Kreis.
  const effectiveR = active ? ACTIVE_R : INACTIVE_R;
  const scale = effectiveR / ACTIVE_R;
  // Ohne nennenswerten Fluss wird der komplette Knoten (Ring, Icon, Wert,
  // Pfeile) grau dargestellt statt in seiner Akzentfarbe zu verharren, dazu
  // insgesamt abgedunkelt (Gruppen-Opazität) und der dunkle Kreis-Hintergrund
  // entfernt, damit inaktive Knoten spürbar zurücktreten.
  const color = def.grey ? C_GREY : (have && active ? def.color(w) : C_GREY);

  const g = el('g', { transform: `translate(${cx},${cy}) scale(${scale})` });
  g.style.setProperty('--nc', rgb(color));
  g.style.opacity = active ? '1' : '0.32';

  // Bodenschatten ganz unten (nur aktiv), damit die Münze über der Fläche liegt.
  if (active) { g.appendChild(makeCoinShadow(ACTIVE_R)); }

  const glow = el('circle', { class: 'node-glow', r: ACTIVE_R });
  glow.style.stroke = active ? `rgba(${color[0]},${color[1]},${color[2]},${glowAlpha(magnitude, def.battery || def.grey ? 5000 : 6000).toFixed(2)})` : 'var(--grey-glow)';
  g.appendChild(glow);
  const ring = el('circle', { class: 'node-ring', r: ACTIVE_R });
  ring.style.fill = active ? 'url(#plasticFill)' : 'none';
  g.appendChild(ring);
  // Münz-Aufbau von unten nach oben: Kantenanschliff, diffuses Glanzlicht,
  // knackiger Glint.
  if (active) {
    g.appendChild(makeBevel(ACTIVE_R));
    g.appendChild(makeHighlight(ACTIVE_R));
    g.appendChild(makeSpecular(ACTIVE_R));
  }

  const iconG = el('g', { class: 'node-icon', transform: 'translate(0,-30)', 'stroke-width': 2, fill: 'none' });
  ICONS[def.icon](iconG, def.battery ? (d.socHave ? d.soc : null) : null);
  if (active) { iconG.setAttribute('filter', 'url(#relief)'); }
  g.appendChild(iconG);

  // Platzreserve wie für "33,333 kW" (breitester realistischer Wert)
  // eingeplant, Wert vertikal nahe der Kreismitte statt weiter oben.
  const valText = el('text', { x: 0, y: 9, 'text-anchor': 'middle', class: 'node-value' });
  if (active) { valText.setAttribute('filter', 'url(#relief)'); }
  valText.appendChild(document.createTextNode('0'));
  const unit = el('tspan', { class: 'node-value-unit', dx: 2 });
  unit.textContent = 'kW';
  valText.appendChild(unit);
  setValueText(valText, magnitude);
  g.appendChild(valText);

  const labelText = el('text', { x: 0, y: 28, 'text-anchor': 'middle', class: 'node-label' });
  labelText.textContent = def.label;
  g.appendChild(labelText);

  // Speiche: von der Kante des äußeren Knotens bis zur Kante des
  // Kollektor-Rings, exakt entlang der Verbindungslinie berechnet - "streng
  // geometrisch", keine Freihand-Kurven.
  const dx = CX - cx, dy = CY - cy;
  const dist = Math.hypot(dx, dy);
  const ux = dx / dist, uy = dy / dist;
  const startX = cx + ux * effectiveR, startY = cy + uy * effectiveR;
  const endX   = CX - ux * R_RING, endY   = CY - uy * R_RING;

  const markerId = 'arrow-' + def.key;
  markerDefs.appendChild(makeMarker(markerId, color));

  const wireStatic = el('line', { class: 'wire', x1: startX, y1: startY, x2: endX, y2: endY });

  const dir = def.dir(w);
  const flowActive = active;
  // "in"  = Fluss vom Knoten ins Zentrum -> Pfeil endet am Ring (Kreuz-Layout-Mitte)
  // "out" = Fluss vom Zentrum zum Knoten -> Pfeil endet am Knoten
  const outPath = el('path', {
    class: 'wire-flow' + (flowActive && dir === 'in' ? ' active' : ''),
    d: `M${startX},${startY} L${endX},${endY}`,
    'marker-end': `url(#${markerId})`,
  });
  const inPath = el('path', {
    class: 'wire-flow reverse' + (flowActive && dir === 'out' ? ' active' : ''),
    d: `M${endX},${endY} L${startX},${startY}`,
    'marker-end': `url(#${markerId})`,
  });
  [outPath, inPath].forEach(p => { p.style.stroke = rgb(color); });

  return { g, wires: [wireStatic, outPath, inPath] };
}

function handleMessage(raw) {
  syncSvgSize();
  const d = typeof raw === 'string' ? JSON.parse(raw) : raw;

  if (d.font) document.documentElement.style.setProperty('--font', d.font);
  if (d.bg)   document.body.style.background = d.bg;

  const dot = document.getElementById('dot');
  dot.setAttribute('class', 'status-dot' + (d.ok ? ' ok pulse' : ''));
  document.getElementById('stateLabel').textContent = d.stateLabel ?? '–';

  const wiresLayer = document.getElementById('wires-layer');
  const nodesLayer = document.getElementById('nodes-layer');
  const markerDefs = document.getElementById('markerDefs');
  wiresLayer.innerHTML = '';
  nodesLayer.innerHTML = '';
  markerDefs.innerHTML = '';

  if (!d.ok) return;

  const houseW = d.houseW ?? 0;
  const gridImportW = (d.gridHave && (d.gridW ?? 0) < 0) ? Math.abs(d.gridW) : 0;
  const gridShare = houseW > 0 ? Math.min(1, gridImportW / houseW) : 0;
  const centerColor = lerp(C_GREEN, C_RED, gridShare);
  const centerActive = !!d.houseHave && houseW > 20;

  // Wie bei den äußeren Knoten: Ring/Glow bleiben bei ACTIVE_R gezeichnet,
  // die ganze Gruppe (inkl. Icon/Wert/Beschriftung) wird stattdessen
  // skaliert, damit bei Inaktivität wirklich der gesamte Kreisinhalt
  // schrumpft statt nur der Ring.
  const centerScale = (centerActive ? ACTIVE_R : INACTIVE_R) / ACTIVE_R;
  const centerG = document.getElementById('node-center');
  centerG.setAttribute('transform', `translate(280,301) scale(${centerScale})`);
  centerG.style.setProperty('--nc', rgb(d.houseHave && centerActive ? centerColor : C_GREY));
  centerG.style.opacity = centerActive ? '1' : '0.32';
  centerG.querySelector('.node-ring').style.fill = centerActive ? 'url(#plasticFill)' : 'none';
  ['center-shadow', 'center-bevel', 'center-highlight', 'center-spec'].forEach(id => {
    document.getElementById(id).style.display = centerActive ? '' : 'none';
  });
  document.getElementById('center-icon').setAttribute('filter', centerActive ? 'url(#relief)' : '');
  document.getElementById('lbl-center-val').setAttribute('filter', centerActive ? 'url(#relief)' : '');
  centerG.querySelector('.node-glow').style.stroke = centerActive
    ? `rgba(${centerColor[0]},${centerColor[1]},${centerColor[2]},${glowAlpha(houseW, 8000).toFixed(2)})`
    : 'var(--grey-glow)';
  setValueText(document.getElementById('lbl-center-val'), houseW);

  const activeDefs = NODE_DEFS.filter(def => d[def.have]);
  activeDefs.forEach((def) => {
    const { g, wires } = buildOuterNode(def, def.angle, d, markerDefs);
    // Pfeile/Lauflinien für den Moment ausgeblendet (SHOW_FLOW), Geometrie
    // bleibt vollständig berechnet, um sie jederzeit einfach wieder
    // einzuschalten.
    if (SHOW_FLOW) { wires.forEach(w => wiresLayer.appendChild(w)); }
    nodesLayer.appendChild(g);
  });
}
</script>
