<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  html, body { margin: 0; height: 100%; background: transparent; }
  .wrap { position: relative; box-sizing: border-box; height: 100vh; display: flex; flex-direction: column; padding: 52px 12px 10px; font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
  /* Steuerelemente horizontal zentriert, direkt unter dem Kacheltitel. Nicht in
     das Titelband selbst legen — dort fängt die IPS-Kopfzeile die Klicks ab. */
  #bar { display: flex; align-items: center; justify-content: center; gap: 8px; flex-wrap: wrap; }
  #body { display: flex; flex: 1 1 auto; min-height: 0; gap: 10px; margin-top: 8px; }
  #tabs { display: flex; flex-direction: column; gap: 4px; flex: 0 0 auto; padding-top: 2px; }
  button.tab { font: inherit; font-size: 12px; font-weight: 600; text-align: left; white-space: nowrap; padding: 7px 12px; border-radius: 8px; border: 1px solid transparent; background: transparent; color: inherit; cursor: pointer; opacity: .6; }
  button.tab:hover { opacity: .85; background: rgba(127,135,145,.10); }
  button.tab.active { opacity: 1; background: rgba(127,135,145,.16); border-color: rgba(127,135,145,.35); }
  #chartcol { flex: 1 1 auto; min-width: 0; display: flex; flex-direction: column; }
  button.nav { font: inherit; font-size: 14px; line-height: 1; width: 30px; height: 30px; border-radius: 8px; border: 1px solid rgba(127,135,145,.35); background: rgba(127,135,145,.12); color: inherit; cursor: pointer; }
  button.nav:disabled { opacity: .35; cursor: default; }
  /* Schnellwahl Vorgestern/Gestern/Heute — nur in der Tagesansicht sichtbar. */
  #quick { display: flex; gap: 4px; }
  button.qday { font: inherit; font-size: 12px; font-weight: 600; padding: 6px 10px; border-radius: 8px; border: 1px solid rgba(127,135,145,.35); background: rgba(127,135,145,.12); color: inherit; cursor: pointer; }
  button.qday:hover:not(:disabled) { background: rgba(127,135,145,.22); }
  button.qday.active { background: rgba(127,135,145,.30); border-color: rgba(127,135,145,.55); }
  button.qday:disabled { opacity: .35; cursor: default; }
  input.pick, select.pick, select.sel { font: inherit; font-size: 13px; font-weight: 600; padding: 4px 8px; border-radius: 8px; border: 1px solid rgba(127,135,145,.35); background: rgba(127,135,145,.12); color: inherit; cursor: pointer; }
  select.sel { padding-right: 26px; -webkit-appearance: none; appearance: none; background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M0 0l5 6 5-6z' fill='%239aa4b0'/></svg>"); background-repeat: no-repeat; background-position: right 9px center; }
  #pickwrap .rangeTxt { font-size: 13px; font-weight: 600; padding: 0 4px; }
  #chart { width: 100%; flex: 1 1 auto; min-height: 160px; }
  .empty { font-size: 13px; padding: 28px 10px; text-align: center; }
</style>
</head>
<body>
  <div class="wrap">
    <div id="bar">
      <select id="type" class="sel"></select>
      <button id="prev" class="nav" title="Zurück">&#9664;</button>
      <span id="pickwrap"></span>
      <button id="next" class="nav" title="Vor">&#9654;</button>
      <span id="quick"></span>
    </div>
    <div id="body">
      <div id="tabs"></div>
      <div id="chartcol"><div id="chart"></div></div>
    </div>
  </div>

  <script>
    var lastData = null, curType = null, curIdx = 0, curTab = null, chart = null, chartEngine = null, libs = { hc: 0, ec: 0 };
    // Legenden-Sichtbarkeit je Kurven-Label (true/false). Bleibt über Zeitraum-
    // und Ansichtswechsel erhalten, damit die Auswahl nicht zurückgesetzt wird.
    // Legenden-Sichtbarkeit je Kurven-Label. Bleibt über Zeitraum-/Reiter-/
    // Ansichtswechsel erhalten UND über ein Neuladen der Kachel (localStorage).
    var vis = {}, visKey = null, visLoaded = false;
    function isVisible(label) { return vis[label] !== false; }
    function loadVis() { if (visLoaded) { return; } visLoaded = true; try { var s = localStorage.getItem(visKey); if (s) { vis = JSON.parse(s) || {}; } } catch (e) {} }
    function saveVis() { try { localStorage.setItem(visKey, JSON.stringify(vis)); } catch (e) {} }
    function setVisible(label, on) { vis[label] = on; saveVis(); }
    var customFrom = null, customTo = null;
    var ORDER = ['day', 'week', 'month', 'year', 'all', 'custom'];
    var TYPENAME = { day: 'Tag (Verlauf)', week: 'Woche (Energie)', month: 'Monat (Energie)', year: 'Jahr (Energie)', all: 'Gesamt (Energie)', custom: 'Benutzerdefiniert' };
    var INPUT_TYPE = { day: 'date', week: 'week', month: 'month' };
    function fmtDE(iso) { return iso ? (iso.slice(8, 10) + '.' + iso.slice(5, 7) + '.' + iso.slice(0, 4)) : ''; }

    function handleMessage(payload) {
      var data = (typeof payload === 'string') ? JSON.parse(payload) : payload;
      if (!data) { return; }
      lastData = data;
      visKey = 'ihubmon_vis_' + (data.uid || 'x');
      loadVis();
      document.body.style.background = data.bg ? data.bg : 'transparent';
      document.documentElement.style.background = data.bg ? data.bg : 'transparent';
      applyTheme(data);
      var ctl = ['type', 'prev', 'pickwrap', 'next', 'quick'];
      if (!data.ok || !data.types || !data.tabs || !data.tabs.length) {
        destroyChart();
        ctl.forEach(function (id) { document.getElementById(id).style.display = 'none'; });
        document.getElementById('tabs').innerHTML = '';
        document.getElementById('chart').innerHTML = '<div class="empty">' + (data.stateLabel || 'Keine Daten') + '</div>';
        return;
      }
      ctl.forEach(function (id) { document.getElementById(id).style.display = ''; });
      if (!curTab || !tabByKey(curTab)) { curTab = data.defaultTab || data.tabs[0].key; }
      buildTabs(data);
      buildTypeSelect(data);
      if (!curType || activeTab().types.indexOf(curType) < 0) { curType = activeTab().types[0]; curIdx = 0; }
      if (curIdx >= periods().length) { curIdx = 0; }
      document.getElementById('type').value = curType;
      buildPicker();
      render();
    }

    function tabByKey(k) { return (lastData.tabs || []).filter(function (t) { return t.key === k; })[0] || null; }
    function activeTab() { return tabByKey(curTab) || (lastData.tabs || [])[0]; }

    function buildTabs(data) {
      var wrap = document.getElementById('tabs');
      wrap.style.display = (data.tabs.length <= 1) ? 'none' : '';
      wrap.innerHTML = '';
      data.tabs.forEach(function (t) {
        var b = document.createElement('button');
        b.className = 'tab' + (t.key === curTab ? ' active' : '');
        b.textContent = t.label;
        b.onclick = function () {
          if (curTab === t.key) { return; }
          curTab = t.key;
          Array.prototype.forEach.call(wrap.children, function (c) { c.classList.remove('active'); });
          b.classList.add('active');
          if (activeTab().types.indexOf(curType) < 0) { curType = activeTab().types[0]; }
          curIdx = Math.min(curIdx, periods().length - 1); if (curIdx < 0) { curIdx = 0; }
          buildTypeSelect(lastData);
          document.getElementById('type').value = curType;
          buildPicker();
          render();
        };
        wrap.appendChild(b);
      });
    }

    function periods() { return (lastData.types[curType] || {}).periods || []; }
    function idxById(arr, id) { for (var i = 0; i < arr.length; i++) { if (arr[i].id === id) { return i; } } return -1; }

    // Aktuell darzustellende Periode. „custom" wird aus den mitgelieferten
    // Tageswerten und dem gewählten Von–Bis-Bereich synthetisiert.
    function activePeriod() { return (curType === 'custom') ? synthCustom() : (periods()[curIdx] || null); }
    function synthCustom() {
      var c = lastData.types.custom || {}, meta = lastData.seriesMeta;
      if (!customFrom) { customFrom = c.from; } if (!customTo) { customTo = c.to; }
      var cats = [], series = meta.map(function () { return []; });
      (c.daily || []).forEach(function (row) {
        if (row.d >= customFrom && row.d <= customTo) {
          cats.push(fmtDE(row.d).slice(0, 6));
          meta.forEach(function (m, s) { series[s].push(row.v[s] != null ? row.v[s] : null); });
        }
      });
      return { cats: cats, series: series, range: fmtDE(customFrom) + ' – ' + fmtDE(customTo) };
    }

    function buildTypeSelect(data) {
      var sel = document.getElementById('type'), html = '', allow = activeTab().types;
      ORDER.forEach(function (t) { var dt = data.types[t]; if (allow.indexOf(t) >= 0 && dt && (dt.periods ? dt.periods.length : (dt.daily && dt.daily.length))) { html += '<option value="' + t + '">' + (TYPENAME[t] || t) + '</option>'; } });
      sel.innerHTML = html;
      sel.style.display = (sel.options.length <= 1) ? 'none' : '';
      sel.onchange = function () { curType = this.value; curIdx = 0; buildPicker(); render(); };
    }

    // Schnellwahl Vorgestern/Gestern/Heute — direkter Sprung ohne Datumsfeld.
    // Nur in der Tagesansicht; Tage ohne Archivdaten sind ausgegraut.
    function localISO(offsetDays) {
      var d = new Date(); d.setDate(d.getDate() + offsetDays);
      return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    }
    function buildQuick() {
      var q = document.getElementById('quick');
      q.innerHTML = '';
      if (curType !== 'day') { q.style.display = 'none'; return; }
      q.style.display = '';
      var arr = periods();
      [['Vorgestern', -2], ['Gestern', -1], ['Heute', 0]].forEach(function (def) {
        var i = idxById(arr, localISO(def[1]));
        var b = document.createElement('button');
        b.className = 'qday' + (i >= 0 && i === curIdx ? ' active' : '');
        b.textContent = def[0];
        b.disabled = (i < 0);
        b.onclick = function () { if (i >= 0 && i !== curIdx) { curIdx = i; syncNav(); render(); } };
        q.appendChild(b);
      });
      applyTheme(lastData);   // frisch erzeugte Buttons einfärben
    }

    function buildPicker() {
      var wrap = document.getElementById('pickwrap');
      // Benutzerdefiniert: zwei Datumsfelder Von–Bis.
      if (curType === 'custom') {
        var c = lastData.types.custom || {};
        if (!customFrom) { customFrom = c.from; } if (!customTo) { customTo = c.to; }
        document.getElementById('prev').style.display = 'none';
        document.getElementById('next').style.display = 'none';
        wrap.innerHTML = '';
        var lo = (c.daily && c.daily.length) ? c.daily[0].d : '', hi = (c.daily && c.daily.length) ? c.daily[c.daily.length - 1].d : '';
        var mk = function (val, isFrom) {
          var el = document.createElement('input'); el.type = 'date'; el.className = 'pick'; el.value = val;
          if (lo) { el.min = lo; } if (hi) { el.max = hi; }
          el.onchange = function () { if (isFrom) { customFrom = this.value; } else { customTo = this.value; } if (customFrom > customTo) { if (isFrom) { customTo = customFrom; } else { customFrom = customTo; } } buildPicker(); render(); };
          return el;
        };
        wrap.appendChild(mk(customFrom, true));
        var dash = document.createElement('span'); dash.className = 'rangeTxt'; dash.textContent = '–'; wrap.appendChild(dash);
        wrap.appendChild(mk(customTo, false));
        applyTheme(lastData); return;
      }
      var arr = periods(), single = arr.length <= 1;
      document.getElementById('prev').style.display = single ? 'none' : '';
      document.getElementById('next').style.display = single ? 'none' : '';
      wrap.innerHTML = '';
      if (single) { var s = document.createElement('span'); s.className = 'rangeTxt'; s.textContent = arr[0] ? arr[0].range : ''; wrap.appendChild(s); applyTheme(lastData); return; }
      var it = INPUT_TYPE[curType], el;
      if (it) {
        el = document.createElement('input'); el.type = it; el.className = 'pick';
        el.min = arr[arr.length - 1].id; el.max = arr[0].id; el.value = arr[curIdx].id;
        el.onchange = function () { var i = idxById(arr, this.value); if (i >= 0) { curIdx = i; syncNav(); render(); } else { this.value = arr[curIdx].id; } };
      } else {
        el = document.createElement('select'); el.className = 'sel pick';
        var h = ''; for (var i = 0; i < arr.length; i++) { h += '<option value="' + i + '">' + (arr[i].range || '') + '</option>'; }
        el.innerHTML = h; el.value = curIdx;
        el.onchange = function () { curIdx = +this.value; syncNav(); render(); };
      }
      wrap.appendChild(el);
      document.getElementById('prev').onclick = function () { if (curIdx < arr.length - 1) { curIdx++; syncNav(); render(); } };
      document.getElementById('next').onclick = function () { if (curIdx > 0) { curIdx--; syncNav(); render(); } };
      applyTheme(lastData);
    }

    function syncNav() {
      buildQuick();
      if (curType === 'custom') { return; }
      var arr = periods(), el = document.querySelector('#pickwrap .pick');
      if (el) { if (el.tagName === 'SELECT') { el.value = curIdx; } else { el.value = arr[curIdx].id; } }
      document.getElementById('prev').disabled = (curIdx >= arr.length - 1);
      document.getElementById('next').disabled = (curIdx <= 0);
    }

    function render() {
      syncNav(); sizeChart();
      var engine = (lastData.engine === 'highcharts') ? 'highcharts' : 'echarts';
      var p = activePeriod(), idx = activeTab().idx;
      var has = p && idx.some(function (i) { var s = p.series[i]; return s && s.length; });
      var el = document.getElementById('chart');
      if (!has) { destroyChart(); el.innerHTML = '<div class="empty">Keine Archivdaten für diesen Zeitraum</div>'; return; }
      ensureLib(engine, function () {
        if (typeof echarts === 'undefined' && typeof Highcharts === 'undefined') { el.innerHTML = '<div class="empty">Diagramm-Bibliothek konnte nicht geladen werden (Internet erforderlich).</div>'; return; }
        if (chart && chartEngine !== engine) { destroyChart(); }
        chartEngine = engine;
        if (engine === 'echarts' && typeof echarts !== 'undefined') { buildEC(); } else if (typeof Highcharts !== 'undefined') { buildHC(); }
      });
    }

    function sizeChart() {
      var el = document.getElementById('chart');
      var h = Math.max(160, (window.innerHeight || document.documentElement.clientHeight) - el.getBoundingClientRect().top - 12);
      el.style.height = h + 'px';
      // resize() OHNE feste Maße: ECharts liest Breite UND Höhe frisch aus dem
      // Container. Sonst blieb im Vollbild (Container startet kurz mit Breite 0)
      // nur ein grauer Bereich stehen.
      if (chart) { try { if (chartEngine === 'echarts') { chart.resize(); } else { chart.setSize(el.clientWidth, h, false); } } catch (e) {} }
    }

    function isDarkColor(hex) { var m = /^#?([0-9a-f]{6})$/i.exec(hex || ''); if (!m) { return null; } var n = parseInt(m[1], 16); return (0.299 * ((n >> 16) & 255) + 0.587 * ((n >> 8) & 255) + 0.114 * (n & 255)) < 140; }
    function themeDark(d) { var b = isDarkColor(d && d.bg); return (b !== null) ? b : (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches); }
    function applyTheme(d) {
      var dark = themeDark(d), fg = dark ? '#e8edf2' : '#1b2430';
      ['type', 'prev', 'next'].forEach(function (id) { var e = document.getElementById(id); if (e) { e.style.color = fg; } });
      Array.prototype.forEach.call(document.querySelectorAll('#quick .qday'), function (e) { e.style.color = fg; });
      var pk = document.querySelector('#pickwrap .pick'); if (pk) { pk.style.color = fg; pk.style.colorScheme = dark ? 'dark' : 'light'; }
      if (d && d.font) { document.querySelector('.wrap').style.fontFamily = d.font; }
    }
    function addScript(src, cb) { var s = document.createElement('script'); s.src = src; s.onload = cb; s.onerror = function () { cb && cb(); }; document.head.appendChild(s); }
    function ensureLib(engine, cb) {
      if (engine === 'echarts') {
        if (typeof echarts !== 'undefined') { libs.ec = 2; return cb(); }
        if (libs.ec === 1) { return setTimeout(function () { ensureLib(engine, cb); }, 80); }
        libs.ec = 1; addScript('https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js', function () { libs.ec = 2; cb(); });
      } else {
        if (typeof Highcharts !== 'undefined' && Highcharts.seriesTypes && Highcharts.seriesTypes.line) { libs.hc = 2; return cb(); }
        if (libs.hc === 1) { return setTimeout(function () { ensureLib(engine, cb); }, 80); }
        libs.hc = 1; addScript('https://code.highcharts.com/highcharts.js', function () { libs.hc = 2; cb(); });
      }
    }
    function destroyChart() { if (chart) { try { if (chartEngine === 'highcharts') { chart.destroy(); } else { chart.dispose(); } } catch (e) {} } chart = null; chartEngine = null; var c = document.getElementById('chart'); if (c) { c.innerHTML = ''; } }

    // Produktionsfenster (Sonnenaufgang..-untergang) + 1 h Rand, ermittelt aus
    // den Kurven, die nachts auf ~0 fallen (Leistung/Einstrahlung). Serien, die
    // nicht auf null gehen (Temperatur, Spannung), bleiben unberücksichtigt.
    function prodWindow() {
      var day = periods()[curIdx], lo = null, hi = null, idx = activeTab().idx;
      idx.forEach(function (i) {
        var pts = day.series[i];
        if (!pts || !pts.length) { return; }
        var max = -Infinity, min = Infinity, j;
        for (j = 0; j < pts.length; j++) { var v = pts[j][1]; if (v > max) { max = v; } if (v < min) { min = v; } }
        if (!(max > 0) || min > 0.1 * max) { return; }   // nur „geht auf 0"-Serien
        var thr = 0.03 * max;
        for (j = 0; j < pts.length; j++) { if (pts[j][1] > thr) { if (lo === null || pts[j][0] < lo) { lo = pts[j][0]; } if (hi === null || pts[j][0] > hi) { hi = pts[j][0]; } } }
      });
      if (lo === null || hi === null || hi <= lo) { return null; }
      return [lo - 3600000, hi + 3600000];
    }

    function theme() {
      var dark = themeDark(lastData);
      return { dark: dark, TEXT: dark ? '#e8edf2' : '#1b2430', MUTED: dark ? '#9fb0c0' : '#5c6b7a',
        GRID: dark ? 'rgba(127,135,145,.22)' : 'rgba(20,30,45,.14)', TIP: dark ? 'rgba(28,38,52,.97)' : 'rgba(255,255,255,.98)',
        font: (lastData.font) || 'system-ui, sans-serif' };
    }

    // ---- Highcharts ----
    function buildHC() {
      var T = theme(), tp = lastData.types[curType], p = activePeriod(), el = document.getElementById('chart');
      var tab = activeTab(), units = tab.units[curType] || { left: '', right: '' };
      var bar = (tp.mode === 'bar');
      var series = tab.idx.map(function (i) {
        var m = lastData.seriesMeta[i];
        var u = (m.axis === 'right') ? (units.right || '') : (units.left || '');
        return { name: m.label, type: bar ? 'column' : 'line', data: p.series[i] || [], color: m.color, yAxis: (m.axis === 'right' ? 1 : 0), lineWidth: 1.6, dashStyle: (m.dash ? 'Dash' : 'Solid'), marker: { enabled: false }, visible: isVisible(m.label), tooltip: { valueSuffix: u ? ' ' + u : '' } };
      });
      var xAxis = bar
        ? { type: 'category', categories: p.cats || [], gridLineWidth: 0, lineColor: T.GRID, tickLength: 0, labels: { style: { color: T.MUTED, fontSize: '10px' } } }
        : (function () { var w = prodWindow(); var a = { type: 'datetime', gridLineWidth: 1, gridLineColor: T.GRID, lineColor: T.GRID, tickLength: 0, labels: { style: { color: T.MUTED, fontSize: '10px' } } }; if (w) { a.min = w[0]; a.max = w[1]; } return a; })();
      var options = {
        chart: { backgroundColor: 'transparent', style: { fontFamily: T.font }, animation: false, height: el.clientHeight, spacingTop: 6, marginRight: 14, alignTicks: false, zooming: { type: 'x', mouseWheel: { enabled: true } }, panning: { enabled: true, type: 'x' }, panKey: 'shift', resetZoomButton: { position: { align: 'right', x: -10, y: 8 }, theme: { fill: T.TIP, stroke: T.GRID, style: { color: T.TEXT } } } },
        title: { text: undefined }, credits: { enabled: false }, exporting: { enabled: false },
        legend: { enabled: true, itemStyle: { color: T.TEXT, fontSize: '11px', fontWeight: '400' }, itemHoverStyle: { color: T.TEXT } },
        xAxis: xAxis,
        yAxis: [
          { title: { text: units.left || '', style: { color: T.MUTED } }, gridLineColor: T.GRID, labels: { style: { color: T.MUTED, fontSize: '10px' } } },
          { title: { text: units.right || '', style: { color: T.MUTED } }, opposite: true, gridLineWidth: 0, labels: { style: { color: T.MUTED, fontSize: '10px' } } }
        ],
        tooltip: { shared: true, backgroundColor: T.TIP, borderColor: T.GRID, style: { color: T.TEXT, fontSize: '11px' }, xDateFormat: '%d.%m.%Y %H:%M', valueDecimals: 2 },
        plotOptions: { series: { animation: false, states: { inactive: { opacity: 1 } }, events: { legendItemClick: function () { setVisible(this.name, !this.visible); } } }, column: { borderWidth: 0, groupPadding: 0.08 } },
        series: series
      };
      el.innerHTML = ''; chart = Highcharts.chart('chart', options);
    }

    // ---- ECharts ----
    function buildEC() {
      var T = theme(), tp = lastData.types[curType], p = activePeriod(), el = document.getElementById('chart');
      var tab = activeTab(), units = tab.units[curType] || { left: '', right: '' }, meta = lastData.seriesMeta;
      function unitFor(name) { for (var k = 0; k < meta.length; k++) { if (meta[k].label === name) { return meta[k].axis === 'right' ? (units.right || '') : (units.left || ''); } } return units.left || ''; }
      var bar = (tp.mode === 'bar');
      var series = tab.idx.map(function (i) {
        var m = meta[i];
        if (bar) { return { name: m.label, type: 'bar', data: p.series[i] || [], yAxisIndex: (m.axis === 'right' ? 1 : 0), itemStyle: { color: m.color } }; }
        return { name: m.label, type: 'line', showSymbol: false, smooth: false, data: p.series[i] || [], yAxisIndex: (m.axis === 'right' ? 1 : 0), lineStyle: { color: m.color, width: 1.6, type: (m.dash ? 'dashed' : 'solid') }, itemStyle: { color: m.color } };
      });
      var xAxis = bar
        ? { type: 'category', data: p.cats || [], axisLabel: { color: T.MUTED, fontSize: 10 }, axisLine: { lineStyle: { color: T.GRID } }, axisTick: { show: false } }
        : (function () { var w = prodWindow(); var a = { type: 'time', axisLabel: { color: T.MUTED, fontSize: 10, hideOverlap: true }, axisLine: { lineStyle: { color: T.GRID } }, splitLine: { show: true, lineStyle: { color: T.GRID } } }; if (w) { a.min = w[0]; a.max = w[1]; } return a; })();
      function p2(x) { return (x < 10 ? '0' : '') + x; }
      var option = {
        backgroundColor: 'transparent', textStyle: { fontFamily: T.font, color: T.TEXT }, animation: false,
        grid: { left: 52, right: 52, top: 34, bottom: 26, containLabel: false },
        dataZoom: [{ type: 'inside', xAxisIndex: 0, filterMode: 'none' }],
        legend: { top: 2, textStyle: { color: T.TEXT, fontSize: 11 }, selected: (function () { var sel = {}; meta.forEach(function (m) { sel[m.label] = isVisible(m.label); }); return sel; })() },
        tooltip: { trigger: 'axis', backgroundColor: T.TIP, borderColor: T.GRID, borderWidth: 1, textStyle: { color: T.TEXT, fontSize: 11 },
          axisPointer: { type: bar ? 'shadow' : 'line', lineStyle: { color: T.MUTED, type: 'dashed' } },
          formatter: function (ps) {
            if (!ps || !ps.length) { return ''; }
            var head;
            if (bar) { head = ps[0].axisValue; }
            else { var d = new Date(ps[0].value[0]); head = p2(d.getDate()) + '.' + p2(d.getMonth() + 1) + '.' + d.getFullYear() + ' ' + p2(d.getHours()) + ':' + p2(d.getMinutes()); }
            var h = '<div style="font-weight:500;margin-bottom:2px">' + head + '</div>';
            ps.forEach(function (s) {
              var v = bar ? s.value : s.value[1]; if (v === null || v === undefined) { return; }
              var u = unitFor(s.seriesName);
              h += '<div><span style="color:' + s.color + '">●</span> ' + s.seriesName + ': <b>' + Number(v).toLocaleString('de-DE', { maximumFractionDigits: 2 }) + (u ? ' ' + u : '') + '</b></div>';
            });
            return h;
          } },
        xAxis: xAxis,
        yAxis: [
          { type: 'value', name: units.left || '', nameTextStyle: { color: T.MUTED, fontSize: 10 }, axisLabel: { color: T.MUTED, fontSize: 10 }, axisLine: { show: false }, splitLine: { lineStyle: { color: T.GRID } } },
          { type: 'value', name: units.right || '', nameTextStyle: { color: T.MUTED, fontSize: 10 }, position: 'right', axisLabel: { color: T.MUTED, fontSize: 10 }, axisLine: { show: false }, splitLine: { show: false } }
        ],
        series: series
      };
      if (!chart) { el.innerHTML = ''; chart = echarts.init(el, null, { renderer: 'canvas' }); chart.on('legendselectchanged', function (pr) { if (pr && pr.selected) { Object.keys(pr.selected).forEach(function (k) { vis[k] = pr.selected[k]; }); saveVis(); } }); chart.getZr().on('dblclick', function () { chart.dispatchAction({ type: 'dataZoom', start: 0, end: 100 }); }); }
      chart.setOption(option, true); chart.resize();
      // Nach dem Rendern ggf. verzögert nachziehen (Vollbild-/Layout-Wechsel,
      // bei dem der Container erst nach dem ersten Render seine Endgröße hat).
      setTimeout(sizeChart, 60); setTimeout(sizeChart, 300);
    }

    var rz; function onResize() { clearTimeout(rz); rz = setTimeout(function () { if (lastData) { sizeChart(); } }, 120); }
    window.addEventListener('resize', onResize);
    if (window.ResizeObserver) {
      var ro = new ResizeObserver(onResize);
      ro.observe(document.body);
      var cc = document.getElementById('chartcol');
      if (cc) { ro.observe(cc); } // Vollbild: eigener Chart-Container ändert sich
    }

    if (typeof window !== 'undefined') { window.handleMessage = handleMessage; }
  </script>
</body>
</html>
